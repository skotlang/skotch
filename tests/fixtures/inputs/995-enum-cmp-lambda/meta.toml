name     = "995-enum-cmp-lambda"
status   = "supported"
features = ["lambda", "enum"]
notes    = "Reference equality on an enum entry inside a lambda (`it == V.A`). Enum entries are emitted as `public static final` singletons constructed once in the enum class `<clinit>`; the per-entry accessor returns the shared instance via `getstatic`, so the reference `==` holds. Outputs 1."
