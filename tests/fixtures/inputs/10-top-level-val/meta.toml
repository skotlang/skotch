name     = "10-top-level-val"
status   = "supported"
features = ["fun", "println", "top-level-val", "string-literal"]
notes    = """
Top-level `val` declarations with literal initializers are inlined
as constants at every reference site. We deliberately do NOT emit a
JVM static final field + `<clinit>` for the simple case — inlining
is faster to compile, smaller in the output, and produces identical
runtime behavior. The `<clinit>` route is reserved for future
fixtures whose initializers aren't compile-time constants.
"""

