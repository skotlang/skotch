name = "1323-local-fn-capture-recursion"
status = "supported"
features = ["local-fn", "closure-capture", "recursion", "stringbuilder"]
reason = "Lock-in for parity/37-local-functions. Local function `helper` captures `s` (val String) AND `builder` (val StringBuilder), then recurses. Pre-fix: outer call site used `scope.find($capture$fn$*)` which returned the same latest-match entry for every capture slot (e.g. `s, s` instead of `builder, s`); recursive self-call inside the local fn body found no $capture$ keys in inner_scope at all, so it didn't forward captures and the lone Int arg got boxed + checkcast-to-StringBuilder → VerifyError. Fix: store capture source-level names in MirFunction.param_names (including the pre-placeholder entry, since the recursive call reads it during inner-fn lowering), then at the call site look up each capture by its source-level name — works for both outer scope and inner_scope (where the local fn's own params are bound under that name)."
