reason = "End-to-end lock-in for skotch-examples/23-game-of-life: Conway's Game of Life with an IMMUTABLE Generation class (only val fields, methods return fresh instances). Glider pattern traverses 4 generations. Exercises class method dispatch on val-only state — the var-field staleness pattern that bit examples 19/21 doesn't apply. Two known-fragile patterns triggered in the original draft (also worked around): variable name `step` colliding with method `step()` confused the parser into seeing `step++` as malformed args; nested while-loop with multiple `var` accumulators (`count = count + cells[...]`) inside if-branches triggered method stubbing — both fixed by extracting helpers (`cellSafe`, `nextCell`) and renaming the loop counter."
