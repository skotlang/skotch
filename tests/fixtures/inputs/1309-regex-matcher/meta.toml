name = "1309-regex-matcher"
status = "supported"
features = ["sealed-class", "is-dispatch", "recursive", "string-indexing", "char-literal"]
reason = "End-to-end lock-in for skotch-examples/25-regex-matcher: sealed Re AST (CharRe, DotRe, Concat, Alt, Star) + recursive-descent regex parser + greedy-with-backtracking matcher. 20 (pattern, input) test cases all round-trip byte-identical to kotlinc. Workarounds in the example: top-level entry `describe` (not `check` — that collides with Kotlin stdlib's `check()` null-check intrinsic and skotch's resolver routes the call through the intrinsic instead of the user function), `matchAt` dispatched via small one-liner-per-arm helper methods (a single matchAt body with 5 `if (re is X) { ... }` arms gets stubbed by use-before-def, even with single-return-at-end shape)."
