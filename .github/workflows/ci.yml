name: CI

# Run on every push and every pull_request. Cancel any in-flight runs
# for the same branch when a new commit lands so we don't pile up
# stale jobs.
on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  # ─── Format check ────────────────────────────────────────────────────
  # Cheap and fast — runs on Linux only.
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ─── Clippy ──────────────────────────────────────────────────────────
  # Lints with -D warnings (set via RUSTFLAGS above). Linux only —
  # clippy results are platform-independent for our pure-Rust codebase.
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets

  # ─── Build + test matrix ─────────────────────────────────────────────
  # The interesting one. Builds the full workspace and runs every test
  # on Linux, macOS (arm64), and Windows. The skotch front-end and all
  # backends are pure Rust with no host dependencies, so the matrix
  # should be uniformly green.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --workspace --all-targets
      - name: cargo test
        run: cargo test --workspace
      - name: skotch emit smoke test
        # End-to-end smoke: emit a hello-world for every backend that
        # doesn't need an external toolchain. The native target is
        # gated on `clang` being on PATH, which all three runners have.
        shell: bash
        run: |
          set -euo pipefail
          INPUT=tests/fixtures/inputs/02-println-string-literal/input.kt
          mkdir -p smoke
          cargo run --quiet -p skotch-cli -- emit --target jvm "$INPUT" -o smoke/InputKt.class
          cargo run --quiet -p skotch-cli -- emit --target dex "$INPUT" -o smoke/classes.dex
          cargo run --quiet -p skotch-cli -- emit --target klib "$INPUT" -o smoke/hello.klib
          cargo run --quiet -p skotch-cli -- emit --target llvm "$INPUT" -o smoke/hello.ll
          test -s smoke/InputKt.class
          test -s smoke/classes.dex
          test -s smoke/hello.klib
          test -s smoke/hello.ll

  # ─── Release-mode test ───────────────────────────────────────────────
  # The shipping `skotch` binary is built in release mode, and the
  # `tests/no_external_compiler.rs` test only meaningfully greps a
  # release binary (debug builds are full of panic strings that may
  # contain forbidden substrings). Run that test specifically against
  # the release binary on each platform.
  test-release:
    name: test --release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --release
