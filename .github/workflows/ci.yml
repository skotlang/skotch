name: CI

# Run on every push and every pull_request. Cancel any in-flight runs
# for the same branch when a new commit lands so we don't pile up
# stale jobs.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Find Kotlin installation path (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          Get-Command kotlinc | Select-Object -ExpandProperty Source
      - name: Find Kotlin installation path (non-Windows)
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          echo "KOTLIN_HOME: ${KOTLIN_HOME}"
          which kotlinc
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --workspace --all-targets
      - name: cargo test
        run: cargo test --workspace
      - name: skotch emit smoke test
        # End-to-end smoke: emit a hello-world for every backend that
        # doesn't need an external toolchain. The native target is
        # gated on `clang` being on PATH, which all three runners have.
        shell: bash
        run: |
          set -euo pipefail
          INPUT=tests/fixtures/inputs/02-println-string-literal/input.kt
          mkdir -p smoke
          cargo run --quiet -p skotch-cli -- emit --target jvm "$INPUT" -o smoke/InputKt.class
          cargo run --quiet -p skotch-cli -- emit --target dex "$INPUT" -o smoke/classes.dex
          cargo run --quiet -p skotch-cli -- emit --target klib "$INPUT" -o smoke/hello.klib
          cargo run --quiet -p skotch-cli -- emit --target llvm "$INPUT" -o smoke/hello.ll
          test -s smoke/InputKt.class
          test -s smoke/classes.dex
          test -s smoke/hello.klib
          test -s smoke/hello.ll

  test-release:
    name: test --release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --release

  android-build:
    name: cross-build (aarch64 + x86_64 Android)
    runs-on: ubuntu-latest
    # Pure cross-compile sanity check: build the skotch CLI for
    # Android in both debug and release modes, for both aarch64
    # (physical devices) and x86_64 (the standard emulator image
    # architecture). We don't run anything — this only verifies the
    # binaries link and the transitive crate graph stays Android-
    # compatible on both ABIs.
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android

      - name: Put pre-installed NDK toolchain on PATH
        # GitHub-hosted ubuntu runners ship the Android NDK; the path
        # is exposed via the ANDROID_NDK_HOME env var. `.cargo/config.toml`
        # references `aarch64-linux-android21-clang` /
        # `x86_64-linux-android21-clang` and `llvm-ar` by bare name —
        # all live under the NDK's
        # `toolchains/llvm/prebuilt/linux-x86_64/bin` directory.
        # Adding it to PATH (rather than CARGO_TARGET_..._LINKER) lets
        # the checked-in config.toml stay portable across hosts.
        run: |
          set -euo pipefail
          : "${ANDROID_NDK_HOME:?ANDROID_NDK_HOME is not set on this runner}"
          echo "Using ANDROID_NDK_HOME=${ANDROID_NDK_HOME}"
          echo "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2
        with:
          key: android-${{ runner.os }}

      - name: cargo build (debug, aarch64-linux-android)
        run: cargo build --target aarch64-linux-android -p skotch-cli

      - name: cargo build (release, aarch64-linux-android)
        run: cargo build --release --target aarch64-linux-android -p skotch-cli

      - name: cargo build (debug, x86_64-linux-android)
        run: cargo build --target x86_64-linux-android -p skotch-cli

      - name: cargo build (release, x86_64-linux-android)
        run: cargo build --release --target x86_64-linux-android -p skotch-cli

      - name: Verify Android ELF artifacts
        # Sanity-check the file shape so a future build regression
        # (e.g. linker producing a non-PIE binary, missing the
        # Android dynamic linker, or producing a wrong ELF class)
        # surfaces here rather than at deploy time.
        run: |
          set -euo pipefail
          for variant in debug release; do
            arm_bin="target/aarch64-linux-android/${variant}/skotch"
            echo "--- ${arm_bin} ---"
            test -f "$arm_bin"
            file "$arm_bin"
            file "$arm_bin" | grep -q "ELF 64-bit LSB pie executable, ARM aarch64"
            file "$arm_bin" | grep -q "interpreter /system/bin/linker64"

            x86_bin="target/x86_64-linux-android/${variant}/skotch"
            echo "--- ${x86_bin} ---"
            test -f "$x86_bin"
            file "$x86_bin"
            file "$x86_bin" | grep -q "ELF 64-bit LSB pie executable, x86-64"
            file "$x86_bin" | grep -q "interpreter /system/bin/linker64"
          done

  parity-bench:
    name: parity bench (kotlinc ${{ matrix.kotlin }})
    runs-on: ubuntu-latest
    # End-to-end parity + benchmark: build the skotch release CLI,
    # then run every parity/NN-* example against the matrix-pinned
    # kotlinc version. Per-example status (pass / fail-diff /
    # fail-compile) and skotch-vs-kotlinc timings are aggregated into
    # a markdown summary; failure diff snippets are inlined and the
    # full TSV is uploaded as an artifact.
    #
    # NOT gated on the unit-test jobs — parity is informational and we
    # want it on every run even if a unit test broke.
    #
    # The Kotlin version is a single-entry matrix today; add more
    # versions later to flag regressions against multiple kotlincs
    # (e.g. on a release-tagged kotlinc bump). Each version is one
    # parallel job.
    strategy:
      fail-fast: false
      matrix:
        kotlin: ['2.4.0']
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install kotlinc ${{ matrix.kotlin }}
        run: |
          set -euo pipefail
          ver="${{ matrix.kotlin }}"
          curl -sSL \
            "https://github.com/JetBrains/kotlin/releases/download/v${ver}/kotlin-compiler-${ver}.zip" \
            -o /tmp/kotlinc.zip
          unzip -q /tmp/kotlinc.zip -d "$HOME"
          echo "$HOME/kotlinc/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2
        with:
          # Keyed on kotlin version so multi-matrix runs share the
          # rust cache (cargo build output is independent of kotlinc).
          key: parity-bench

      - name: Build skotch (release)
        run: cargo build --release -p skotch-cli

      # Cache the external repo clones that parity/[0-9][0-9][0-9]-*/
      # examples pull down via their project.sh declarations. The cache
      # key includes every project.sh on disk, so a tag/repo bump in any
      # project.sh invalidates the cache and triggers a fresh checkout.
      # Without this, every CI run re-clones each project (1s for clikt
      # 5.1.0 — small, but it adds up across matrix entries).
      - name: Cache parity project checkouts
        uses: actions/cache@v4
        with:
          path: parity/*/.checkout
          key: parity-projects-${{ hashFiles('parity/[0-9][0-9][0-9]-*/project.sh') }}

      - name: Run parity bench
        # Always succeeds; per-example failures land in the TSV and
        # diffs/ directory, which the summary + artifact pick up.
        # KOTLINC_RUNS=3 → kotlinc compiles each example three times,
        # min wins. Filters out JVM cold-start + JIT-warmup tax that
        # otherwise doubles the first-run timing.
        #
        # Project-mode examples (parity/[0-9][0-9][0-9]-*) clone their
        # target repository on demand inside the harness. `git` is
        # preinstalled on ubuntu-latest, so no setup step is needed.
        env:
          KOTLINC_RUNS: '1'
        run: ./scripts/parity_bench.sh

      - name: Publish markdown summary
        env:
          KOTLIN_TAG: ${{ matrix.kotlin }}
          KOTLINC_RUNS: '1'
          REPO_REF: ${{ github.sha }}
        run: |
          ./scripts/parity_summary.sh _bench/parity_bench.tsv \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Upload bench artifact
        uses: actions/upload-artifact@v4
        with:
          name: parity-bench-kotlinc-${{ matrix.kotlin }}
          path: _bench/
          retention-days: 90
