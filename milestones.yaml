# ============================================================================
# v0.6.0 — Higher-Order Function Dispatch
# ============================================================================
# THIS IS THE SINGLE MOST IMPORTANT REMAINING LANGUAGE FEATURE.
#
# Currently, lambdas work when stored in local variables and invoked
# directly (val f = { x: Int -> x * 2 }; f(5)). But passing a lambda
# as a function-typed parameter DOES NOT WORK:
#
#   fun apply(f: (Int) -> Int, x: Int): Int = f(x)  // BROKEN
#   apply({ it * 2 }, 5)                             // BROKEN
#
# This blocks: .map, .filter, .fold, .sortBy, .groupBy, and every
# higher-order stdlib function. It also blocks custom HOFs that are
# pervasive in Kotlin code.
#
# IMPLEMENTATION STRATEGY:
# The fix requires a $Callable interface (or FunctionN hierarchy).
# When a function takes a parameter of type (A) -> B, the MIR must:
#   1. Type the parameter as $Callable (or Function1<A,B>)
#   2. At the call site, the lambda class already has invoke() —
#      it just needs to implement the $Callable interface
#   3. Inside the function body, f(x) desugars to f.invoke(x)
#      dispatched via invokeinterface on $Callable
#
# ALTERNATIVE: Use invokedynamic + LambdaMetafactory (JDK 8+).
# This is how real kotlinc works. Avoids generating $Lambda classes
# entirely. But it's more complex to implement in the backend.
#
# RECOMMENDED APPROACH: Start with $Callable interface (simpler),
# upgrade to invokedynamic later for performance.
#
# PITFALLS:
#   - Function arity: (Int)->Int vs (Int,Int)->Int need different
#     interfaces or a single invoke(vararg Any) with boxing
#   - Return type erasure: invoke() returns Object, callers must cast
#   - Primitive boxing overhead at every call boundary
#   - Interaction with generics: fun <T> map(f: (T)->T) needs erasure
# ============================================================================

  - version: "0.6.0"
    title: "Higher-Order Function Dispatch"
    status: completed
    depends_on: ["0.5.0"]
    description: >
      The critical unlock: passing lambdas through function-typed parameters.
      Without this, .map/.filter/.fold and all custom HOFs are impossible.

    features:
      - name: "FunctionN interface hierarchy"
        completed: true
        description: >
          Synthetic $Function0, $Function1, $Function2, ... interfaces
          generated on demand with abstract invoke(Object...) -> Object.
          Lambda $Lambda$N classes implement the appropriate $FunctionN.
          Function-typed parameters typed as $FunctionN. Dispatch via
          invokeinterface. Args autoboxed, returns unboxed.
          Fixture: 375-higher-order-function.
        acceptance_criteria:
          - "fun apply(f: (Int) -> Int, x: Int) = f(x); apply({ it * 2 }, 5) → 10"

      - name: "Lambda-to-FunctionN bridge"
        completed: true
        description: >
          $Lambda$N classes declare implements $FunctionN. invoke() uses
          erased types (all params Ty::Any, return Ty::Any). Lambda body
          unboxes params to annotated types. Return values autoboxed.

      - name: "Function reference syntax"
        description: >
          ::functionName creates a FunctionN reference to a named function.
          val f: (Int) -> Int = ::double. Not yet implemented.
        acceptance_criteria:
          - "val f = ::println; f(42) prints 42"

      - name: "Multi-arity dispatch"
        completed: true
        description: >
          $Function0 through $FunctionN generated per arity.
          Each interface has invoke() with the correct number of
          Object parameters.

    risks:
      - description: "Primitive boxing at every HOF boundary kills performance"
        mitigation: "Accept boxing for now; invokedynamic optimization in v0.15+"

# ============================================================================
# v0.7.0 — Null Safety and Type System Hardening
# ============================================================================
# Kotlin's null safety is THE defining type system feature. Currently we
# parse nullable types but don't enforce them. This milestone makes the
# type checker actually reject null-unsafe code.
#
# IMPLEMENTATION STRATEGY:
# The type checker already has Ty::Nullable(Box<Ty>). What's missing:
#   1. Method calls on nullable receivers must require ?. or !!
#   2. Assignments from nullable to non-nullable must error
#   3. Smart cast narrowing from T? to T after null checks
#   4. Safe call (?.) must short-circuit to null
#   5. Elvis (?:) must work correctly with nullable operands
#   6. !! must emit a null check + throw
#
# PITFALLS:
#   - Platform types from Java: everything from Java is T! (nullable/unknown)
#   - Smart cast invalidation: var reassignment invalidates narrowing
#   - Intersection types from multiple is-checks
#   - Nothing type for functions that never return (throw, TODO())
# ============================================================================

  - version: "0.7.0"
    title: "Null Safety and Type System Hardening"
    status: in_progress
    depends_on: ["0.6.0"]
    description: >
      Enforce nullable/non-nullable type checking. Safe calls, elvis,
      non-null assertion, smart cast narrowing in all contexts.

    features:
      - name: "Nullable type enforcement"
        description: >
          Reject assignment of T? to T without null check. Error on
          method calls on nullable receiver without ?. or !!.
        acceptance_criteria:
          - "val x: String = null // compile error"
          - "val x: String? = null; x.length // compile error"

      - name: "Safe call operator (?.)"
        completed: true
        description: >
          x?.length short-circuits to null if receiver is null.
          Multi-block lowering: null-check → then-block (dispatch on
          unwrapped type) / else-block (store null). Handles property
          access and method calls. Primitives autoboxed for nullable
          result. Fixture: 376-safe-call-nonnull.
        acceptance_criteria:
          - "val x: String? = null; println(x?.length) // prints null"

      - name: "Non-null assertion (!!)"
        completed: true
        description: >
          x!! unwraps Nullable(T) to T. Creates new local with
          non-nullable type for correct downstream dispatch.
          Fixture: 376-safe-call-nonnull.
        acceptance_criteria:
          - "val x: String? = \"hi\"; println(x!!.length) // prints 2"

      - name: "Smart casts in when branches"
        completed: true
        description: >
          when (x) { is String -> x.uppercase() } narrows x to String
          in the branch body. Emits checkcast + scope narrowing for
          reference types. Fixture: 377-when-smart-cast.
        acceptance_criteria:
          - "when (x) { is String -> x.uppercase() } compiles"

      - name: "Nothing type"
        description: >
          throw expressions have type Nothing. Functions returning Nothing
          (e.g., error(), TODO()) allow unreachable code elimination.

    risks:
      - description: "Platform type annotations from Java interop are complex"
        mitigation: "Treat all Java types as T! (nullable-agnostic) initially"

# ============================================================================
# v0.8.0 — Full Collections and Stdlib Core
# ============================================================================
# With HOFs working (v0.6.0), we can implement the full collection API.
# This is the most-used part of Kotlin's stdlib.
#
# IMPLEMENTATION STRATEGY:
# Two approaches:
#   A. Intrinsic lowering: hardcode map/filter/fold as MIR patterns
#   B. Load kotlin-stdlib.jar and call real implementations
#
# Approach A is what we've done for forEach. It works but doesn't scale
# to 200+ collection functions. Approach B requires classfile parsing
# of the stdlib JAR and routing calls to it.
#
# RECOMMENDED: Hybrid. Intrinsic for the top ~20 functions (map, filter,
# fold, any, first, last, sortedBy, groupBy, associate, flatten,
# zip, take, drop, count, sum, max, min, toList, toSet, toMap).
# Load stdlib JAR for the rest.
#
# PITFALLS:
#   - Generic type inference: listOf(1,2,3).map { it * 2 } needs
#     the compiler to infer that `it` is Int from the List<Int> context
#   - Chained operations: list.filter { }.map { }.first() must propagate
#     types through the chain
#   - MutableList/MutableMap/MutableSet: need add/put/remove/clear
#   - Pair and Triple: need Pair<A,B> class with first/second fields
#   - Ranges: IntRange, LongRange, CharRange with step
# ============================================================================

  - version: "0.8.0"
    title: "Full Collections and Stdlib Core"
    status: planned
    depends_on: ["0.7.0"]
    description: >
      map, filter, fold, sorted, grouped, mutable collections, Pair/Triple,
      ranges with step, and the top ~50 most-used stdlib functions.

    features:
      - name: "Collection HOFs (map, filter, fold, etc.)"
        description: >
          listOf(1,2,3).map { it * 2 }.filter { it > 3 } → [4, 6].
          Top 20 collection extensions as intrinsics.
        acceptance_criteria:
          - "listOf(1,2,3).map { it * 2 }.filter { it > 3 } == listOf(4, 6)"

      - name: "Mutable collections"
        description: >
          mutableListOf, mutableMapOf, mutableSetOf. add(), put(),
          remove(), clear(), addAll(), contains(), isEmpty().
        acceptance_criteria:
          - "val list = mutableListOf(1,2,3); list.add(4); println(list.size) // 4"

      - name: "Map and Set"
        description: >
          mapOf(1 to \"a\"), setOf(1,2,3). Map.get(), Map.keys,
          Map.values, Map.entries. Set operations.
        acceptance_criteria:
          - "mapOf(1 to \"a\")[1] == \"a\""

      - name: "Pair and Triple"
        description: >
          Pair(a, b) with .first/.second. Triple(a, b, c).
          Infix `to` function: 1 to \"a\" creates Pair.
        acceptance_criteria:
          - "val (k, v) = 1 to \"hello\"; println(v) // hello"

      - name: "Ranges with step"
        description: >
          1..10 step 2, 'a'..'z', IntRange, LongRange, CharRange.
          for (i in 1..10 step 2) iterates 1, 3, 5, 7, 9.

      - name: "String stdlib completions"
        description: >
          split, joinToString, toList, toCharArray, toByteArray,
          padStart, padEnd, reversed, first, last, drop, take,
          lines, repeat. The 30 most-used String functions.

    risks:
      - description: "Generic type inference through chained calls is hard"
        mitigation: "Require explicit lambda param types initially; infer `it` type later"

# ============================================================================
# v0.9.0 — Coroutines and Suspend Functions
# ============================================================================
# THE HARDEST MILESTONE. Coroutines require a CPS (continuation-passing
# style) transform that converts sequential suspend code into a state
# machine. This is ~2000 lines of the most complex compiler code in
# any Kotlin implementation.
#
# IMPLEMENTATION STRATEGY:
# Study kotlinc's CoroutineTransformerMethodVisitor in detail.
# The transform works as follows:
#
#   suspend fun fetchData(): String {
#       val a = suspendCall1()    // suspend point 0
#       val b = suspendCall2(a)   // suspend point 1
#       return a + b
#   }
#
#   ↓ transforms to ↓
#
#   fun fetchData(continuation: Continuation<String>): Any? {
#       val sm = continuation as? FetchDataContinuation
#           ?: FetchDataContinuation(continuation)
#       when (sm.label) {
#           0 -> { sm.label = 1; val result = suspendCall1(sm); if (result == COROUTINE_SUSPENDED) return result; }
#           1 -> { val a = sm.result; sm.label = 2; val result = suspendCall2(a, sm); if (result == COROUTINE_SUSPENDED) return result; }
#           2 -> { val a = sm.a; val b = sm.result; sm.continuation.resume(a + b); return; }
#       }
#   }
#
# Each suspend point becomes a state in the state machine. Local
# variables that cross suspend boundaries are saved to the
# continuation object's fields.
#
# PITFALLS:
#   - Variable liveness: must determine which locals are live across
#     each suspend point and save/restore them
#   - Exception handling: try-catch around suspend calls needs careful
#     state machine integration
#   - Tail call optimization: tailrec suspend functions
#   - Cancellation: CancellationException must propagate correctly
#   - CoroutineContext: must thread through the dispatcher
#   - Structured concurrency: coroutineScope, supervisorScope
#   - Flow: cold streams built on suspend + channels
#
# RECOMMENDED APPROACH:
#   Phase 1: Sequential suspends only (no branching across suspend points)
#   Phase 2: Branching (if/when with suspend calls in branches)
#   Phase 3: Loops with suspend calls
#   Phase 4: Try-catch with suspend calls
#   Phase 5: Flow and channels
# ============================================================================

  - version: "0.9.0"
    title: "Coroutines and Suspend Functions"
    status: planned
    depends_on: ["0.8.0"]
    description: >
      CPS state machine transform for suspend functions. runBlocking,
      launch, async/await, delay. The hardest single milestone.

    features:
      - name: "Suspend function CPS transform"
        description: >
          suspend fun becomes a state machine with Continuation<T> param.
          Local variables saved/restored across suspend points. Each
          suspend call becomes a state transition.
        acceptance_criteria:
          - "suspend fun fetch(): String with two sequential suspend calls works"

      - name: "runBlocking builder"
        description: >
          runBlocking { } creates a coroutine scope and blocks the current
          thread until all child coroutines complete. Minimum viable
          coroutine runtime.
        acceptance_criteria:
          - "runBlocking { delay(10); println(\"done\") } prints \"done\""

      - name: "launch and async/await"
        description: >
          launch { } starts a fire-and-forget coroutine.
          async { } starts a coroutine that returns Deferred<T>.
          deferred.await() suspends until the result is ready.

      - name: "delay function"
        description: >
          delay(millis) suspends the coroutine for the given duration
          without blocking the thread. Implemented via a scheduled
          continuation resume.

      - name: "CoroutineScope and structured concurrency"
        description: >
          coroutineScope { } creates a child scope. Parent waits for
          all children. Cancellation propagates to children.

    risks:
      - description: "CPS transform is ~2000 lines of the most complex compiler code"
        mitigation: "Start with sequential suspends; add branching later"
      - description: "CoroutineContext threading is subtle"
        mitigation: "Implement single-threaded dispatcher first; multi-thread later"

# ============================================================================
# v0.10.0 — Nested Classes, Full Enums, Sealed Hierarchies
# ============================================================================
# These features are partially implemented but have gaps that need
# closing for real-world Kotlin code.
#
# PITFALLS:
#   - Inner classes hold a reference to the outer class instance
#   - Nested classes are static on JVM (no outer reference)
#   - Enum.values(), Enum.valueOf(), Enum.entries need array allocation
#   - Sealed class subclasses must all be in the same file
#   - Sealed interface (Kotlin 1.5+) — subclasses in same module
# ============================================================================

  - version: "0.10.0"
    title: "Nested Classes, Full Enums, Sealed Completeness"
    status: planned
    depends_on: ["0.9.0"]
    description: >
      Inner/nested classes, enum values()/valueOf()/entries, sealed
      interface, sealed with object subclasses.

    features:
      - name: "Nested classes"
        description: >
          class Outer { class Nested { } } — Nested is a static inner
          class on JVM. No reference to Outer instance.

      - name: "Inner classes"
        description: >
          class Outer { inner class Inner { } } — Inner holds implicit
          reference to Outer. Access outer members via this@Outer.

      - name: "Enum values() and valueOf()"
        description: >
          Color.values() returns Array<Color>. Color.valueOf("RED")
          returns the matching entry. Color.entries returns List<Color>.

      - name: "Enum with methods and properties"
        description: >
          enum class Planet(val mass: Double) { EARTH(5.97) { override fun display() = "Earth" } }.
          Enum entries can override methods.

      - name: "Sealed interfaces"
        description: >
          sealed interface Result. Subclasses must be in same module.
          Exhaustive when checking for sealed interfaces.

    risks:
      - description: "Inner class outer reference adds complexity to closures"
        mitigation: "Implement nested (static) first; inner after"

# ============================================================================
# v0.11.0 — Advanced Functions and Expressions
# ============================================================================
# These are the remaining function/expression features that real
# Kotlin code uses frequently.
#
# PITFALLS:
#   - try-as-expression: `val x = try { f() } catch { default }` needs
#     the parser to handle `try` in expression position
#   - when-as-expression with smart casts in each branch
#   - Labeled returns: return@forEach, return@launch
#   - Tailrec: must detect tail position and emit goto instead of call
#   - Property setter codegen: need field write-back pattern
# ============================================================================

  - version: "0.11.0"
    title: "Advanced Functions and Expressions"
    status: planned
    depends_on: ["0.10.0"]
    description: >
      try-as-expression, multi-statement try bodies, labeled returns,
      tailrec, property setters, extension properties, when-as-expression
      with smart casts, infix call syntax (a op b).

    features:
      - name: "Try as expression"
        description: "val x = try { f() } catch (e: Exception) { default }"

      - name: "Multi-statement try-catch bodies"
        description: >
          Currently only the first statement in a try block executes.
          Fix the MIR lowering to iterate all statements.

      - name: "Labeled returns"
        description: >
          return@forEach — return from the lambda, not the enclosing
          function. Needs label tracking in the MIR lowering.
        acceptance_criteria:
          - "listOf(1,2,3).forEach { if (it == 2) return@forEach; println(it) } prints 1, 3"

      - name: "Tailrec optimization"
        description: >
          tailrec fun gcd(a: Int, b: Int): Int — tail calls become gotos.
        acceptance_criteria:
          - "tailrec factorial with large input doesn't stack overflow"

      - name: "Property setters (codegen)"
        description: >
          var x: Int set(value) { field = value * 2 }. Parser already
          handles syntax; need codegen for setter dispatch.

      - name: "Extension properties"
        description: >
          val String.lastChar: Char get() = this[length - 1].
          Parser and MIR lowering for extension property access.

      - name: "Infix call syntax"
        description: >
          a to b, a shl b. Parser recognizes identifier-as-infix after
          an expression. Desugars to a.to(b).
        acceptance_criteria:
          - "1 to \"one\" creates a Pair"

      - name: "When with smart casts in all branches"
        description: >
          when (x) { is String -> x.length } narrows x to String.
          when { x is String -> x.length } also narrows.

    risks:
      - description: "Labeled returns interact with closures and inline functions"
        mitigation: "Implement non-local returns for inline lambdas only"

# ============================================================================
# v0.12.0 — Full Type System
# ============================================================================
# These are the remaining type system features needed for real Kotlin code.
#
# PITFALLS:
#   - Type inference: Kotlin has bidirectional type inference that is
#     MUCH more sophisticated than what we have. Full Hindley-Milner
#     style inference with constraints is needed for complex code.
#   - Bound checking: T : Comparable<T> should reject non-Comparable types
#   - Declaration-site variance interacts with type projection
#   - Intersection types from smart casts
#   - SAM type inference: when multiple overloads exist
# ============================================================================

  - version: "0.12.0"
    title: "Full Type System"
    status: planned
    depends_on: ["0.11.0"]
    description: >
      Type inference engine, bound enforcement, multi-reified, full
      smart casts, data class equals/hashCode/copy, value classes.

    features:
      - name: "Type inference for lambda parameters"
        description: >
          listOf(1,2,3).map { it * 2 } — infer `it` type as Int from
          context (List<Int>.map expects (Int)->R).

      - name: "Upper bound enforcement"
        description: >
          fun <T : Comparable<T>> max(a: T, b: T) rejects non-Comparable
          types at compile time.

      - name: "Multi-reified type parameters"
        description: >
          inline fun <reified A, reified B> check(x: Any) — full function
          body inlining with multiple type substitutions.

      - name: "Data class equals/hashCode/copy"
        description: >
          Auto-synthesize equals(), hashCode(), copy() with default params.
          componentN() already implemented.
        acceptance_criteria:
          - "Point(1,2) == Point(1,2) is true"
          - "Point(1,2).copy(y=3) == Point(1,3)"

      - name: "Value classes (@JvmInline)"
        description: >
          @JvmInline value class Password(val s: String). Erased to
          underlying type at call sites. Mangled method names on JVM.

      - name: "Intersection types"
        description: >
          After multiple is-checks, the narrowed type is the intersection
          of all checked types.

    risks:
      - description: "Full type inference is the second-hardest feature after coroutines"
        mitigation: "Require explicit types where inference fails; add inference iteratively"

# ============================================================================
# v0.13.0 — Kotlin Stdlib Completeness
# ============================================================================
# Real Kotlin code uses hundreds of stdlib functions. We need either
# intrinsic implementations or the ability to load kotlin-stdlib.jar.
#
# IMPLEMENTATION STRATEGY:
# Loading kotlin-stdlib.jar and calling real implementations is the
# only scalable approach. This requires:
#   1. Classfile parsing of stdlib classes
#   2. Resolving method descriptors from parsed classfiles
#   3. Emitting invokestatic/invokevirtual to stdlib methods
#   4. Including kotlin-stdlib.jar in the runtime classpath
#
# PITFALLS:
#   - Kotlin stdlib uses inline functions heavily — these won't work
#     unless we support inline function body inlining
#   - Many stdlib functions use reified type parameters
#   - Kotlin stdlib depends on kotlin-stdlib-common (multiplatform)
#   - Version compatibility: stdlib version must match language version
# ============================================================================

  - version: "0.13.0"
    title: "Kotlin Stdlib Completeness"
    status: planned
    depends_on: ["0.12.0"]
    description: >
      Load kotlin-stdlib.jar for full stdlib access. Intrinsic fallback
      for inline/reified functions. 95% stdlib coverage.

    features:
      - name: "kotlin-stdlib.jar loading"
        description: >
          Parse kotlin-stdlib.jar classfiles. Resolve method signatures.
          Emit calls to real stdlib implementations.

      - name: "Inline function body inlining"
        description: >
          For stdlib inline functions (require, check, buildList, etc.),
          inline the function body at the call site.

      - name: "Standard IO (readLine, readln)"
        description: "readLine(), readln(), println with format strings."

      - name: "Math functions"
        description: "abs, max, min, sqrt, pow, roundToInt, etc."

      - name: "Regex support"
        description: "Regex class, matchResult, find, replace, split."

# ============================================================================
# v0.14.0 — DEX Backend Parity
# ============================================================================
# The DEX backend currently handles basic functions but lags behind
# JVM for classes, inheritance, lambdas, etc. This milestone brings
# DEX to full parity with JVM.
#
# PITFALLS:
#   - DEX register model vs JVM stack model — completely different codegen
#   - DEX has 64K method reference limit per dex file
#   - DEX encoded_catch_handler format differs from JVM exception tables
#   - DEX needs multi-dex splitting for large apps
# ============================================================================

  - version: "0.14.0"
    title: "DEX Backend Parity"
    status: planned
    depends_on: ["0.13.0"]
    description: >
      Full DEX backend: classes, inheritance, lambdas, generics,
      exception tables, multi-dex. Every JVM fixture must also pass DEX.

    features:
      - name: "DEX class emission"
        description: "User classes, interfaces, inheritance, virtual dispatch."

      - name: "DEX exception tables"
        description: "try-catch in DEX using encoded_catch_handler."

      - name: "DEX lambda support"
        description: "$Lambda$N classes, closure capture, invoke dispatch."

      - name: "Multi-DEX splitting"
        description: ">64K methods → classes.dex + classes2.dex."

# ============================================================================
# v0.15.0 — Multi-File, Packages, and Modules
# ============================================================================
# Real projects have multiple files, packages, and modules.
#
# PITFALLS:
#   - Cross-file name resolution: class in file A used in file B
#   - Package-private visibility
#   - Module boundaries and internal visibility
#   - Classpath ordering affects resolution
# ============================================================================

  - version: "0.15.0"
    title: "Multi-File, Packages, and Modules"
    status: planned
    depends_on: ["0.14.0"]
    description: >
      Multi-file compilation, package-aware resolution, multi-module
      builds, Kotlin metadata emission for cross-module interop.

    features:
      - name: "Multi-file compilation"
        description: >
          Compile multiple .kt files in the same package. Cross-file
          references resolved via two-pass compilation.

      - name: "Multi-module compilation"
        description: >
          Compile module A, then module B that depends on A. Module A's
          classes available when compiling B.

      - name: "Kotlin metadata emission"
        description: >
          @Metadata annotation on generated classes with protobuf payload.
          Required for kotlinc-compiled code to interop with skotch output.

      - name: "Internal visibility enforcement"
        description: "internal members visible within module, hidden outside."

