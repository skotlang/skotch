# ============================================================================
# v0.6.0 — Higher-Order Function Dispatch
# ============================================================================
# THIS IS THE SINGLE MOST IMPORTANT REMAINING LANGUAGE FEATURE.
#
# Currently, lambdas work when stored in local variables and invoked
# directly (val f = { x: Int -> x * 2 }; f(5)). But passing a lambda
# as a function-typed parameter DOES NOT WORK:
#
#   fun apply(f: (Int) -> Int, x: Int): Int = f(x)  // BROKEN
#   apply({ it * 2 }, 5)                             // BROKEN
#
# This blocks: .map, .filter, .fold, .sortBy, .groupBy, and every
# higher-order stdlib function. It also blocks custom HOFs that are
# pervasive in Kotlin code.
#
# IMPLEMENTATION STRATEGY:
# The fix requires a $Callable interface (or FunctionN hierarchy).
# When a function takes a parameter of type (A) -> B, the MIR must:
#   1. Type the parameter as $Callable (or Function1<A,B>)
#   2. At the call site, the lambda class already has invoke() —
#      it just needs to implement the $Callable interface
#   3. Inside the function body, f(x) desugars to f.invoke(x)
#      dispatched via invokeinterface on $Callable
#
# ALTERNATIVE: Use invokedynamic + LambdaMetafactory (JDK 8+).
# This is how real kotlinc works. Avoids generating $Lambda classes
# entirely. But it's more complex to implement in the backend.
#
# RECOMMENDED APPROACH: Start with $Callable interface (simpler),
# upgrade to invokedynamic later for performance.
#
# PITFALLS:
#   - Function arity: (Int)->Int vs (Int,Int)->Int need different
#     interfaces or a single invoke(vararg Any) with boxing
#   - Return type erasure: invoke() returns Object, callers must cast
#   - Primitive boxing overhead at every call boundary
#   - Interaction with generics: fun <T> map(f: (T)->T) needs erasure
# ============================================================================

  - version: "0.6.0"
    title: "Higher-Order Function Dispatch"
    status: completed
    depends_on: ["0.5.0"]
    description: >
      The critical unlock: passing lambdas through function-typed parameters.
      Without this, .map/.filter/.fold and all custom HOFs are impossible.

    features:
      - name: "FunctionN interface hierarchy"
        completed: true
        description: >
          Synthetic $Function0, $Function1, $Function2, ... interfaces
          generated on demand with abstract invoke(Object...) -> Object.
          Lambda $Lambda$N classes implement the appropriate $FunctionN.
          Function-typed parameters typed as $FunctionN. Dispatch via
          invokeinterface. Args autoboxed, returns unboxed.
          Fixture: 375-higher-order-function.
        acceptance_criteria:
          - "fun apply(f: (Int) -> Int, x: Int) = f(x); apply({ it * 2 }, 5) → 10"

      - name: "Lambda-to-FunctionN bridge"
        completed: true
        description: >
          $Lambda$N classes declare implements $FunctionN. invoke() uses
          erased types (all params Ty::Any, return Ty::Any). Lambda body
          unboxes params to annotated types. Return values autoboxed.

      - name: "Function reference syntax (landed)"
        completed: true
        description: >
          ::functionName creates a lambda wrapper for the named function.
          Parser recognizes :: prefix, desugars to { $ref_arg -> f($ref_arg) }.
          Works with HOFs: apply(::double, 5). See fixture 434-function-reference.
        acceptance_criteria:
          - "val f = ::println; f(42) prints 42"

      - name: "Multi-arity dispatch"
        completed: true
        description: >
          $Function0 through $FunctionN generated per arity.
          Each interface has invoke() with the correct number of
          Object parameters.

    risks:
      - description: "Primitive boxing at every HOF boundary kills performance"
        mitigation: "Accept boxing for now; invokedynamic optimization in v0.15+"

# ============================================================================
# v0.7.0 — Null Safety and Type System Hardening
# ============================================================================
# Kotlin's null safety is THE defining type system feature. Currently we
# parse nullable types but don't enforce them. This milestone makes the
# type checker actually reject null-unsafe code.
#
# IMPLEMENTATION STRATEGY:
# The type checker already has Ty::Nullable(Box<Ty>). What's missing:
#   1. Method calls on nullable receivers must require ?. or !!
#   2. Assignments from nullable to non-nullable must error
#   3. Smart cast narrowing from T? to T after null checks
#   4. Safe call (?.) must short-circuit to null
#   5. Elvis (?:) must work correctly with nullable operands
#   6. !! must emit a null check + throw
#
# PITFALLS:
#   - Platform types from Java: everything from Java is T! (nullable/unknown)
#   - Smart cast invalidation: var reassignment invalidates narrowing
#   - Intersection types from multiple is-checks
#   - Nothing type for functions that never return (throw, TODO())
# ============================================================================

  - version: "0.7.0"
    title: "Null Safety and Type System Hardening"
    status: completed
    depends_on: ["0.6.0"]
    description: >
      Enforce nullable/non-nullable type checking. Safe calls, elvis,
      non-null assertion, smart cast narrowing in all contexts.

    features:
      - name: "Nullable type enforcement"
        completed: true
        description: >
          val x: String = null emits compile error "Null can not be a
          value of a non-null type String". Enforced when explicit
          non-nullable type annotation is present and init is NullLit.
        acceptance_criteria:
          - "val x: String = null // compile error"
          - "val x: String? = null; x.length // compile error"

      - name: "Safe call operator (?.)"
        completed: true
        description: >
          x?.length short-circuits to null if receiver is null.
          Multi-block lowering: null-check → then-block (dispatch on
          unwrapped type) / else-block (store null). Handles property
          access and method calls. Primitives autoboxed for nullable
          result. Fixture: 376-safe-call-nonnull.
        acceptance_criteria:
          - "val x: String? = null; println(x?.length) // prints null"

      - name: "Non-null assertion (!!)"
        completed: true
        description: >
          x!! unwraps Nullable(T) to T. Creates new local with
          non-nullable type for correct downstream dispatch.
          Fixture: 376-safe-call-nonnull.
        acceptance_criteria:
          - "val x: String? = \"hi\"; println(x!!.length) // prints 2"

      - name: "Smart casts in when branches"
        completed: true
        description: >
          when (x) { is String -> x.uppercase() } narrows x to String
          in the branch body. Emits checkcast + scope narrowing for
          reference types. Fixture: 377-when-smart-cast.
        acceptance_criteria:
          - "when (x) { is String -> x.uppercase() } compiles"

      - name: "Nothing type"
        completed: true
        description: >
          Ty::Nothing added as bottom type. Assignable to all types.
          throw expressions synthesize Ty::Nothing. Functions returning
          Nothing type-check correctly. All backends handle Nothing.

    risks:
      - description: "Platform type annotations from Java interop are complex"
        mitigation: "Treat all Java types as T! (nullable-agnostic) initially"

# ============================================================================
# v0.8.0 — Full Collections and Stdlib Core
# ============================================================================
# With HOFs working (v0.6.0), we can implement the full collection API.
# This is the most-used part of Kotlin's stdlib.
#
# IMPLEMENTATION STRATEGY:
# Real kotlin-stdlib.jar loading — NOT intrinsics.
# listOf() now calls kotlin/collections/CollectionsKt.listOf([Object;)List
# via the real stdlib JAR. kotlin-stdlib.jar auto-located next to kotlinc
# and added to JVM classpath at REPL/script startup.
#
# For inline functions (forEach, map, filter, fold): these are desugared
# to iterator patterns at the MIR level, which is exactly what kotlinc
# does — it inlines the function body at the call site.
#
# PITFALLS:
#   - Generic type inference: listOf(1,2,3).map { it * 2 } needs
#     the compiler to infer that `it` is Int from the List<Int> context
