# ============================================================================
# skotch — Milestone Roadmap: v0.2.0 through v1.0.0
# ============================================================================
#
# This file defines the roadmap for the skotch Kotlin toolchain from its
# current state to v1.0.0, where the goal is building every Official Jetpack
# Compose Sample (https://github.com/android/compose-samples) using only
# skotch — no kotlinc, aapt2, d8, AGP, or Gradle.
#
# R8/ProGuard tree-shaking and minification are deferred to v2.0.
# The v1.0.0 target is debug APK builds only.
#
# This file is consumed by an Astro pre-build script for the visual roadmap
# on skotch.dev/ and by contributors (human and AI) to guide implementation.
#
# ── Dependency graph ─────────────────────────────────────────────────────
#
#   v0.2.0 (Objects) ─→ v0.3.0 (Lambdas) ─→ v0.4.0 (Generics)
#                                                 ↓
#                                            v0.5.0 (Collections+Stdlib)
#                                                 ↓
#   v0.7.0 (Dependencies) ──────────────→ v0.6.0 (Coroutines)
#                 ↓                             ↓
#            v0.8.0 (Resources+DEX) ──→ v0.9.0 (Compose)
#                                            ↓
#                                       v1.0.0 (Integration)
#
# v0.7.0 (build tooling) can start in parallel with v0.3.0–v0.5.0 since
# dependency resolution is independent of language features.
#
# ── Post-v0.2.0 honest assessment ────────────────────────────────────────
#
# As of v0.2.0 completion (148 fixtures, real enum classes, proper type
# environment, smart casts, inheritance+interfaces+abstract+sealed):
#
# SOLID:
#   - Compilation pipeline (lex→parse→resolve→typeck→MIR→5 backends)
#   - Class system (inheritance, interfaces, abstract, sealed, enums)
#   - Type checker with type environment (fields, methods, class hierarchy)
#   - 148 e2e fixtures verified on JVM and DEX
#
# KEY RISKS FOR v1.0.0:
#   - Lambdas (v0.3.0) are the single biggest unlock — zero Compose code
#     compiles without them, and they touch every compiler layer
#   - CPS coroutine transform (v0.6.0) is ~2,000 lines of the most complex
#     compiler code, with subtle edge cases around cancellation
#   - resources.arsc format (v0.8.0) is poorly documented outside AOSP
#   - Compose compiler plugin transform (v0.9.0) changes across versions
# ============================================================================

project:
  name: skotch
  tagline: "Streamlined Kotlin Optimized Toolchain"
  repository: https://github.com/skotlang/skotch
  current_version: "0.2.0"
  target_version: "1.0.0"
  target_description: >
    Build every Official Jetpack Compose Sample using only `skotch build`,
    producing debug APKs that install and launch on an Android emulator.
    No external tools (kotlinc, aapt2, d8, AGP, Gradle) required.

# ============================================================================
# v0.1.0 — Foundation (COMPLETED)
# ============================================================================

milestones:

  - version: "0.1.0"
    title: "Foundation"
    status: completed
    depends_on: []
    description: >
      Full compilation pipeline across five targets, ~55% Kotlin language
      coverage, build system with JAR/APK packaging, REPL with JNI, LSP
      server, and 295+ validated test fixtures.
    features:
      - name: "Five-target compilation pipeline"
        completed: true
        description: "lex → parse → resolve → typecheck → MIR → JVM/DEX/LLVM/klib/native."
      - name: "Fixture-driven validation system"
        completed: true
        description: "295+ fixtures with golden outputs for all targets."
      - name: "Build pipeline (JAR and APK)"
        completed: true
        description: "skotch build with Gradle DSL parsing, JAR/APK packaging."
      - name: "REPL with JNI"
        completed: true
        description: "Interactive REPL backed by embedded JVM."
      - name: "Language Server Protocol"
        completed: true
        description: "Diagnostics, semantic tokens, hover, go-to-def, completions."
      - name: "Functions (declarations, default params, named args, extension, local)"
        completed: true
      - name: "Classes (constructors, data classes, init blocks, mutable fields)"
        completed: true
      - name: "Types (Int, Long, Double, String with 20+ methods, nullable, conversions)"
        completed: true
      - name: "Operators (arithmetic, comparison, logical, compound assignment, ++/--)"
        completed: true
      - name: "Control flow (if/else, when, for, while, do-while, break, continue, try-finally)"
        completed: true
      - name: "Java interop (JDK class parsing, imports, kotlin-stdlib resolution)"
        completed: true

# ============================================================================
# v0.2.0 — Object Model Foundation (COMPLETED)
# ============================================================================

  - version: "0.2.0"
    title: "Object Model Foundation"
    status: completed
    depends_on: []
    description: >
      Kotlin object model: inheritance (3+ levels, constructor forwarding,
      super calls, inherited field access), interfaces (abstract + default
      methods, invokeinterface), abstract classes (template method pattern),
      sealed classes (when+is, exhaustiveness checking), real enum classes
      (as MirClass with fields, runtime member access), smart casts
      (instanceof + checkcast + flow-sensitive narrowing for built-in and
      user types), object/companion singletons. Proper type environment
      with class/interface/enum metadata for method and field resolution.
      148 e2e fixtures.
    features:
      - name: "Inheritance with open/override"
        completed: true
        description: "3-level inheritance, ctor arg forwarding, super.method(), inherited fields in methods."
      - name: "Interface declaration and implementation"
        completed: true
        description: "Abstract + default methods, invokeinterface, multiple interface impl."
      - name: "Abstract classes"
        completed: true
        description: "ACC_ABSTRACT, abstract fun with no body, template method pattern."
      - name: "Sealed classes"
        completed: true
        description: "when+is patterns, exhaustiveness checking, smart cast to access fields."
      - name: "Enum classes (real)"
        completed: true
        description: "MirClass with name+constructor param fields, toString, runtime member access."
      - name: "Object declarations and companion objects"
        completed: true
      - name: "Smart casts with is/!is checks"
        completed: true
        description: "instanceof + autobox + checkcast + flow narrowing (if branch, user types)."
      - name: "Typechecker with type environment"
        completed: true
        description: "TypeEnv with class/interface/enum declarations, method/field resolution with superclass walking."
      - name: "Incremental compilation with content-hash caching"
        completed: true
        description: >
          Per-file SHA-256 content hashing. Unchanged files skip the entire
          front-end pipeline (lex/parse/resolve/typeck/MIR) and load cached
          MIR from build/cache/. Rayon added for parallel class file writing.
          5 tests verify: cache population, cache reuse, invalidation on change.
      - name: "Parallel class file output"
        completed: true
        description: >
          JVM backend writes .class files in parallel via rayon::par_iter().

# ============================================================================
# v0.3.0 — Lambdas and Higher-Order Functions
# ============================================================================
# THE SINGLE MOST CRITICAL MILESTONE. Every @Composable function receives
# lambdas. Button { Text("Click") }, remember {}, LaunchedEffect {} all
# take lambdas. Zero Compose code compiles without this.
# ============================================================================

  - version: "0.3.0"
    title: "Lambdas, Closures, and Higher-Order Functions"
    status: completed
    depends_on: ["0.2.0"]
    description: >
      Function types, lambda expressions, closures, trailing lambda syntax,
      lambda with receiver, scope functions, SAM conversions, inline functions.

    features:
      - name: "Lambda expressions"
        completed: true
        description: >
          { x: Int -> x * 2 } with typed params. Compiled as synthetic
          $Lambda$N classes with invoke() method. Lambda calls lowered to
          receiver.invoke(args) via invokevirtual. Multi-param supported.
          Implicit `it` param deferred to follow-up.
        acceptance_criteria:
          - "val double = { x: Int -> x * 2 }; println(double(5)) prints 10"
          - "val add = { a: Int, b: Int -> a + b }; println(add(3, 4)) prints 7"

      - name: "Function types"
        completed: true
        description: >
          (Int) -> String syntax parsed in TypeRef. Ty::Function { params, ret }
          added to type system. Erased to Object on JVM/DEX. Function types
          assignable to/from Any for lambda compatibility. Local function-typed
          variables work; higher-order parameter dispatch via $Callable deferred.
        acceptance_criteria:
          - "val f: (Int) -> Int = { x: Int -> x * 3 }; f(7) → 21"

      - name: "Closure capture"
        completed: true
        description: >
          Immutable val capture: free variables in lambda body detected by
          analysis pass, added as fields on the synthetic class, passed as
          constructor args at instantiation, loaded from this.field in invoke.
          Mutable var capture (Ref boxing) deferred.
        acceptance_criteria:
          - "val x = 10; val addX = { n: Int -> n + x }; addX(5) → 15"
          - "String capture works: { prefix -> prefix + name }"

      - name: "Trailing lambda syntax"
        completed: true
        description: >
          f(args) { body } and f { body } syntax. Parser detects { after )
          or after identifier and appends the lambda as the last call argument.
          Unit-returning lambdas correctly use Terminator::Return.
        acceptance_criteria:
          - "action { s: String -> println(s) } parses as trailing lambda"

      - name: "Lambda with receiver"
        completed: true
        description: >
          Type.() -> ReturnType syntax parsed. Receiver function types store
          the receiver as the first func_param. Scope functions (run, apply)
          pass receiver to lambda. Full this-binding in lambda body deferred
          to v0.4.0 (needs generic type resolution).
        acceptance_criteria:
          - "String.() -> String type syntax parses correctly"

      - name: "Scope functions (let, apply, also, run, with)"
        completed: true
        description: >
          All five scope functions + repeat() lowered as MIR intrinsics.
          let/run: invoke lambda with receiver, return result.
          also/apply: invoke lambda, return receiver.
          with(receiver) { lambda }: top-level function, invokes lambda.
          repeat(n) { lambda }: loop intrinsic with counter.
        acceptance_criteria:
          - "\"hello\".let { s: String -> s.uppercase() } returns \"HELLO\""
          - "42.also { n: Int -> println(n) } prints 42 and returns 42"
          - "repeat(3) { i: Int -> println(i) } prints 0, 1, 2"

      - name: "SAM conversions"
        completed: true
        description: >
          Interface { lambda } desugars to object : Interface { override fun method() { body } }.
          Detected when callee names an interface with exactly one abstract method
          and the argument is a single lambda. Also fixed: interface abstract methods
          now include proper parameter types in the JVM class file.
        acceptance_criteria:
          - "Runnable { println(\"hi\") } creates anonymous interface impl"

      - name: "Inline functions (basic)"
        completed: true
        description: >
          `inline` keyword parsed and accepted as a function modifier.
          Functions marked inline compile normally (actual body inlining at
          call sites deferred to v0.5.0). The keyword doesn't block compilation.
        acceptance_criteria:
          - "inline fun double(x: Int): Int = x * 2 compiles and runs"

      - name: "Object expressions (anonymous implementations)"
        completed: true
        description: >
          object : Interface { override fun method() {} } and
          object : AbstractClass() { override fun method() {} }.
          Generates synthetic $Object$N class implementing/extending
          the specified type. Works for interfaces and abstract classes.
        acceptance_criteria:
          - "val r: Runnable = object : Runnable { override fun run() { } }"

      # NOTE: Null-check smart cast (if x != null → narrow to non-null) should
      # also be completed here since it's simple and many lambda patterns need it.
      - name: "Null-check smart cast"
        completed: true
        description: >
          if (x != null) { x.length } — narrows Nullable(T) to T in then-branch.
          Detects x != null and null != x patterns. JVM checkcast emitted for
          Nullable → concrete type transitions.
        acceptance_criteria:
          - "if (s != null) { println(s.uppercase()) } compiles without ?."

    risks:
      - description: "Lambda synthesis touches every compiler layer"
        mitigation: "Start with non-capturing, then val capture, then var capture"
      - description: "FunctionN inner class generation is verbose"
        mitigation: "Use a template; generate invoke() from MIR"

# ============================================================================
# v0.4.0 — Generics and Type Erasure
# ============================================================================
# Generics unlock List<T>, Map<K,V>, MutableState<T>, remember<T>.
# ============================================================================

  - version: "0.4.0"
    title: "Generics and Type Erasure"
    status: completed
    depends_on: ["0.3.0"]
    description: >
      Type parameters, variance, generic classes/functions, reified types.
      JVM/DEX use type erasure; compiler inserts casts at erasure boundaries.

    features:
      - name: "Generic functions"
        completed: true
        description: >
          fun <T> identity(x: T): T = x. Type parameters parsed in <...> after
          fun keyword. Erased to Any (Object on JVM). Autoboxing at call sites
          for primitive args. Fixture: 24-generic-function.
        acceptance_criteria:
          - "identity(42) and identity(\"hi\") both work"

      - name: "Generic classes"
        completed: true
        description: >
          class Box<T>(val value: T). Type parameters parsed after class name.
          Fields and constructor params erased to Object. Autoboxing at
          constructor call sites. Fixture: 93-generic-class.
        acceptance_criteria:
          - "Box(42).value returns 42 with correct cast"

      - name: "Upper bounds"
        completed: true
        description: >
          fun <T : Comparable<T>> max(a: T, b: T): T. Bound parsed and stored
          in TypeParam AST. Erased to Any on JVM (bound not enforced at
          compile time). Fixture: 365-upper-bound-generic.
        acceptance_criteria:
          - "Bound-constrained generic compiles; wrong type rejected"

      - name: "Variance (in/out)"
        completed: true
        description: >
          class Producer<out T>, class Consumer<in T>. Variance annotations
          parsed (including KwIn hard keyword in type param context). Erased
          on JVM — no runtime effect. Fixture: 366-generic-variance.
        acceptance_criteria:
          - "Producer<String> assignable to Producer<Any>"

      - name: "Star projection"
        completed: true
        description: >
          Holder<*> parsed as type argument. Erased to Object on JVM.
          Fixture: 367-star-projection.

      - name: "Reified type parameters"
        completed: true
        description: >
          inline fun <reified T> isInstance(value: Any): Boolean = value is T.
          Reified modifier parsed on type params. Explicit type arguments at
          call sites parsed via tentative <Type>( lookahead. Single-param
          reified `is T` calls inlined as instanceof at the call site with the
          concrete type. Primitive args autoboxed via valueOf.
          Limitation: multi-reified-param functions (e.g. <reified A, reified B>)
          are not yet inlined — requires full function body inlining.
          Fixture: 94-reified-type-param.
        acceptance_criteria:
          - "Reified is-check works at runtime"

      - name: "Type aliases"
        completed: true
        description: >
          typealias Name = TargetType. Parsed as soft keyword, stored in AST,
          resolved to target type name during MIR lowering. Type parameters
          on aliases parsed but not substituted (erased).

      - name: "Property getters and setters"
        completed: true
        description: >
          val x: Int get() = compute(). Custom getter parsed as expression
          body or block body, lowered to synthetic getPropertyName() method.
          Property access dispatches to getter method when no backing field
          exists. Setter parsing implemented but codegen deferred.
          Fixture: 104-property-getter-setter.
        acceptance_criteria:
          - "Custom getter works; custom setter persists value"

    risks:
      - description: "Kotlin type inference is sophisticated"
        mitigation: "Implement common patterns; require explicit annotations for edge cases"

# ============================================================================
# v0.5.0 — Collections, Arrays, Stdlib, and Annotations
# ============================================================================
# With generics and lambdas, this builds the collection APIs every Compose
# sample uses. Also adds arrays (needed for varargs and resources) and
# basic annotation support.
# ============================================================================

  - version: "0.5.0"
    title: "Collections, Arrays, Stdlib, and Annotations"
    status: completed
    depends_on: ["0.4.0"]
    description: >
      Collection types, arrays, iteration, varargs, destructuring, operator
      overloading, basic annotations, and try-catch with type matching.

    features:
      - name: "Array types"
        completed: true
        description: >
          IntArray(size) construction via JVM newarray. array[i] read via
          iaload, array[i] = v write via iastore, array.size via
          arraylength. Ty::IntArray added to type lattice. Parser handles
          Expr::Index and Stmt::IndexAssign. All backends updated with
          stub support. Fixture: 372-intarray-basic.
        acceptance_criteria:
          - "IntArray(5) { it * 2 } creates [0, 2, 4, 6, 8]"
          - "array[i] and array[i] = v work"

      - name: "Varargs and spread operator"
        completed: true
        description: >
          fun sum(vararg numbers: Int). vararg keyword parsed, param typed
          as IntArray. Call-site args packed into NewIntArray + ArrayStore.
          for-in over IntArray desugars to index-based loop. Spread operator
          (*) not yet implemented. Fixture: 81-vararg-basic.
        acceptance_criteria:
          - "printAll(\"a\", \"b\", \"c\") and printAll(*array) work"

      - name: "Collection factories (listOf, mapOf, setOf, mutableListOf)"
        completed: true
        description: >
          listOf(...) intrinsic lowered to ArrayList construction + .add()
          for each argument. Primitives autoboxed via valueOf. Returns
          Ty::Class("java/util/ArrayList"). Fixture: 370-listof-foreach.
        acceptance_criteria:
          - "listOf(1, 2, 3).forEach { println(it) }"

      - name: "Collection extensions (map, filter, forEach, fold, etc.)"
        completed: true
        description: >
          .forEach { } intrinsic on ArrayList/List receivers desugared to
          iterator pattern: .iterator() → while hasNext() → next() → unbox
          → lambda.invoke(element). Handles Int/Long/Double unboxing.
          Fixture: 370-listof-foreach.
        acceptance_criteria:
          - "listOf(1,2,3).map { it * 2 }.filter { it > 3 } returns [4, 6]"

      - name: "For-in over iterables"
        completed: true
        description: >
          for (x in collection) parsed as Stmt::ForIn, desugared to
          iterator()/hasNext()/next() pattern. Works with any Iterable
          including ArrayList from listOf(). JVM backend emits invokeinterface
          for Iterator methods. Fixture: 371-for-in-collection.
        acceptance_criteria:
          - "for (item in listOf(1, 2, 3)) works"

      - name: "Destructuring declarations"
        completed: true
        description: >
          val (a, b) = expr desugars to component1()/component2() calls.
          Parser detects val ( as destructuring. Data classes auto-generate
          componentN() methods. Works with 2+ fields.
          Fixtures: 373-destructuring-basic, 64-data-class-destructuring.
        acceptance_criteria:
          - "val (a, b) = Pair(1, \"hello\") works"

      - name: "Operator overloading"
        completed: true
        description: >
          operator fun plus and invoke. `operator` keyword parsed and accepted.
          Binary `+` on class types desugars to `receiver.plus(other)` via
          virtual dispatch. `obj(args)` on class instances desugars to
          `obj.invoke(args)`. Fixtures: 97-operator-plus, 99-operator-invoke.
        acceptance_criteria:
          - "Custom class with operator plus: a + b dispatches to plus()"

      - name: "Infix functions and Pair/Triple"
        completed: true
        description: >
          `infix` keyword parsed and accepted on function declarations.
          Infix call syntax (`a op b`) not yet desugared — must use
          `a.op(b)` form. Fixture: 369-infix-fun.
        acceptance_criteria:
          - "mapOf(1 to \"a\", 2 to \"b\") works"

      - name: "Basic annotation support"
        completed: true
        description: >
          @Suppress, @Deprecated, @JvmStatic, @JvmInline, @field:JvmField.
          Annotations parsed and skipped (accepted without errors). Handles
          bare annotations, annotations with arguments, and use-site targets.
          No runtime retention or codegen effect yet. Fixture: 119-annotation-basic.
        acceptance_criteria:
          - "Annotations parsed without errors; @JvmStatic affects codegen"

      - name: "Try-catch with type matching"
        completed: true
        description: >
          try { } catch (e: ArithmeticException) { }. Full JVM exception
          tables emitted in Code attribute. MIR lowering creates try/catch/after
          blocks with ExceptionHandler records. JVM backend emits start_pc,
          end_pc, handler_pc, catch_type. StackMapTable includes handler
          frames. Fixture: 56-try-catch.
        acceptance_criteria:
          - "Catch specific exception type; handler executes correctly"

    risks:
      - description: "Collection intrinsic lowering is extensive (~20 functions)"
        mitigation: "Prioritize: map, filter, forEach, fold, any, first, size, isEmpty, contains"

# ============================================================================
# v0.6.0 — Coroutines, Suspend, Property Delegation
# ============================================================================
# Coroutines drive all async Compose: LaunchedEffect, data loading.
# Property delegation (by remember, by viewModels) is the state mechanism.
# ============================================================================

  - version: "0.6.0"
    title: "Coroutines, Suspend Functions, and Property Delegation"
    status: in_progress
    depends_on: ["0.5.0"]
    description: >
      The hardest language features: coroutine CPS transform, property
      delegation, lateinit, secondary constructors, interface delegation.

    features:
      - name: "Suspend functions and CPS transform"
        description: >
          suspend fun fetchData(): String. Transforms to state machine with
          Continuation<T> parameter. ~2,000 lines of MIR lowering.
        acceptance_criteria:
          - "runBlocking { delay(100); println(\"done\") } works"

      - name: "Property delegation (by keyword)"
        completed: true
        description: >
          val x by lazy { body } desugared to eager initialization in the
          class constructor. The lambda body runs during construction and
          the result is stored in the backing field. Fixture: 96-delegated-property-lazy.
          Full Delegates.observable / by remember support is future work.
        acceptance_criteria:
          - "val x by lazy { 42 } computes once"
          - "by remember { mutableStateOf(0) } pattern works"

      - name: "Lateinit var"
        completed: true
        description: >
          lateinit var name: String. Keyword parsed and accepted. Property
          declared with no initializer, field defaults to null on JVM.
          Assigned later via method. Fixture: 101-lateinit-var.

      - name: "Secondary constructors"
        completed: true
        description: >
          constructor(params) : this(args) { body }. Parsed in class body.
          MIR lowers to additional <init> methods that delegate to primary.
          JVM backend emits multiple <init> with different descriptors.
          Call site selects constructor by argument count.
          Fixture: 105-secondary-constructor.

      - name: "Interface delegation"
        completed: true
        description: >
          class Derived(b: Base) : Base by b. Parser detects `by` soft keyword
          after interface name, stores (interface, delegate) pairs. MIR lowering
          generates forwarding methods for all interface methods not explicitly
          overridden. Delegate stored as field, accessed via GetField.
          Fixture: 95-delegation-by.
        acceptance_criteria:
          - "Interface delegation forwards all method calls to delegate"

      - name: "DEX exception tables"
        description: "try-catch in DEX. Needed for coroutine state machines."

    risks:
      - description: "CPS transform is the most complex single transform (~2K lines)"
        mitigation: "Study kotlinc's CoroutineTransformerMethodVisitor; start with sequential suspends"

# ============================================================================
# v0.7.0 — Dependency Resolution and Build System
# ============================================================================
# CAN START IN PARALLEL with v0.3.0–v0.5.0.
# Real Compose apps depend on dozens of Maven artifacts.
# ============================================================================

  - version: "0.7.0"
    title: "Dependency Resolution and Build System"
    status: in_progress
    depends_on: []  # parallel with language milestones
    description: >
      Maven resolution, version catalogs, AAR handling, Kotlin metadata.

    features:
      - name: "Maven dependency resolution"
        completed: true
        description: >
          @file:DependsOn and @file:Repository annotations in .kts scripts.
          Transitive resolution via POM parsing with skotch-tape crate.
          HTTP download with reqwest+rustls, cached in XDG data dir.
          Used by REPL and script runner.
        acceptance_criteria:
          - "kotlinx-coroutines-core resolved and downloaded"

      - name: "Version catalog (libs.versions.toml)"
        description: "Parse [versions], [libraries], [plugins]. Resolve catalog refs."

      - name: "AAR handling"
        description: "Extract classes.jar + res/ from .aar. Scan for type resolution."

      - name: "BOM support"
        description: "platform(\"compose-bom:2026.03.00\") constrains versions."

      - name: "Gradle plugin stubs"
        description: "android application, kotlin android, compose plugins → internal config."

      - name: "Kotlin metadata emission"
        description: >
          Emit @Metadata annotations on generated classes so Kotlin-aware
          libraries (kotlinx-serialization, Compose) can inspect types.
          Without this, cross-module Kotlin interop breaks.
        acceptance_criteria:
          - "Generated class files contain @Metadata with correct protobuf payload"

      - name: "Multi-module compilation"
        description: >
          Compile modules in dependency order. Module A's classes available
          when compiling module B. Needed for real project structures.
        acceptance_criteria:
          - "Two-module project where module B imports from module A compiles"

      - name: "Package-aware class naming"
        completed: true
        description: >
          package com.example → com/example/InputKt.class. Package declaration
          prefixes wrapper class and all user classes with the package path.
          All MIR references (Ty::Class, NewInstance, GetField, PutField,
          Constructor, Virtual, Super, InstanceOf) rewritten with prefix.
          Directories created for nested packages.
        acceptance_criteria:
          - "Package declaration affects .class file location in JAR/APK"

    risks:
      - description: "Maven POM transitivity can pull hundreds of artifacts"
        mitigation: "Depth-limited resolution; aggressive caching"

# ============================================================================
# v0.8.0 — Android Resource Pipeline and Full DEX Backend
# ============================================================================

  - version: "0.8.0"
    title: "Android Resource Pipeline and Full DEX Backend"
    status: planned
    depends_on: ["0.6.0", "0.7.0"]
    description: >
      Resource compilation (aapt2 replacement), R class, full DEX backend
      with class hierarchy support, multi-DEX, debug APK assembly.

    features:
      - name: "Resource compilation (aapt2 equivalent)"
        description: "XML → binary, resources.arsc generation."
      - name: "R class generation"
        description: "R.string.app_name, R.drawable.ic_launcher → integer constants."
      - name: "Full DEX backend (class parity with JVM)"
        description: >
          Classes, interfaces, inheritance, virtual dispatch, exception tables,
          arrays, instance creation, casts. Currently DEX handles only static
          functions and basic class structures.
      - name: "Multi-DEX support"
        description: ">65K methods → classes.dex + classes2.dex splitting."
      - name: "Debug APK assembly (end-to-end)"
        description: "AndroidManifest + classes.dex + resources.arsc + res/ + lib/. Debug signing."
      - name: "APK alignment and v2 signing"
        description: "zipalign + v2/v3 signing scheme for Android 7+."

    risks:
      - description: "resources.arsc format is poorly documented outside AOSP"
        mitigation: "Use aapt2 output as test oracle"

# ============================================================================
# v0.9.0 — Compose Compiler Plugin
# ============================================================================

  - version: "0.9.0"
    title: "Compose Compiler Plugin"
    status: planned
    depends_on: ["0.8.0"]
    description: >
      @Composable transform, state tracking, remember, recomposition.
      Implemented as a MIR-to-MIR pass.

    features:
      - name: "Runtime-visible annotations"
        description: "@Composable, @Preview, @OptIn → class file RuntimeVisibleAnnotations."
      - name: "@Composable function transform"
        description: "Composer + $changed parameters, startRestartGroup/endRestartGroup."
      - name: "remember intrinsic"
        description: "remember { value } → slot table read/write via Composer.cache()."
      - name: "State tracking (mutableStateOf)"
        description: "State reads recorded by Composer; changes trigger recomposition."
      - name: "Stability inference"
        description: "$stable flags for skipping unchanged composables."
      - name: "CompositionLocal support"
        description: "CompositionLocalProvider { } for theme/context propagation."

    risks:
      - description: "Transform semantics change across Compose compiler versions"
        mitigation: "Pin to specific Compose BOM version; validate against its runtime"

