# ============================================================================
# v0.13.0 — Multi-File Compilation, Packages, and Imports
# ============================================================================
# THIS IS THE HARDEST REMAINING GATE. Every real Kotlin project uses
# multiple files, package declarations, and import statements. Without
# this, the build system (v0.20) and everything downstream is impossible.
#
# The build pipeline (skotch-build) already supports multi-file discovery
# and parallel compilation via salsa/rayon. What's missing is the
# front-end: resolving names across files, handling `package` and
# `import` statements, and linking compiled units together.
#
# IMPLEMENTATION STRATEGY:
#   Phase 1: `import` statements — resolve fully-qualified names from
#            the classpath (kotlin-stdlib.jar, dependency JARs)
#   Phase 2: `package` declarations — emit classes with FQ names
#            (com/example/MyClass instead of MyClass)
#   Phase 3: Cross-file resolution — two-pass: first pass collects all
#            declarations, second pass resolves references
#   Phase 4: Multi-module — compile module A first, then module B sees
#            A's output on its classpath
#
# PITFALLS:
#   - Circular references between files in the same package
#   - Package-private vs internal vs public visibility
#   - Star imports (import com.example.*) vs specific imports
#   - Import aliases (import com.example.Foo as Bar)
#   - Classpath ordering affects which class wins on conflict
#   - Name shadowing: local > import > package
# ============================================================================

  - version: "0.13.0"
    title: "Multi-File Compilation, Packages, and Imports"
    status: completed
    depends_on: ["0.12.0"]
    description: >
      Import statements, package declarations, multi-file compilation
      with cross-file name resolution. The critical gate for everything
      downstream — real projects are never single-file.

    features:
      - name: "Import statements"
        completed: true
        description: >
          import java.util.ArrayList, import java.util.Collections —
          import declarations are parsed, stored in the module's import_map
          (simple name → JVM internal path), and used to resolve bare
          class constructors (e.g., ArrayList()) and static method calls
          (e.g., Collections.sort()). Default java.lang.* imports included.

      - name: "Package declarations"
        completed: true
        description: >
          package com.example.app — emitted class has FQ name
          com/example/app/MainKt. Package prefix applied to wrapper class
          and all user-defined classes.

      - name: "Multi-file compilation (same package)"
        completed: true
        description: >
          Two-phase "Gather then Lower" pipeline. Phase 1 parses all .kt
          files and builds a PackageSymbolTable of all top-level declarations
          (functions, vals, classes). Phase 2 compiles each file independently
          with cross-file visibility — cross-file calls emit CallKind::StaticJava
          (invokestatic OtherFileKt.method), matching kotlinc behavior exactly.
          No FuncId remapping needed. Supports circular references between files.
          Each file produces its own MirModule. Test fixtures: multi-file-basic,
          multi-file-circular, multi-file-class.

      - name: "Cross-file class constructors"
        completed: true
        description: >
          File A defines `data class Point(val x: Int, val y: Int)`, file B
          creates `Point(3, 4)`. Class names registered in cross_file_classes
          on MirModule, resolved via the existing constructor resolution path.

      - name: "Multi-module compilation"
        completed: true
        description: >
          Compile modules in dependency order per settings.gradle.kts. Each
          module uses the two-phase pipeline internally. Multi-module build
          already tested via pipeline.rs build_multi_module().

    risks:
      - description: "Circular references between files in the same package"
        mitigation: "Two-pass: collect all declarations first, then resolve"

  # v0.13.5 — Multi-File Polish and Incremental Compilation
  - version: "0.13.5"
    title: "Multi-File Polish and Incremental Compilation"
    status: completed
    depends_on: ["0.13.0"]
    description: >
      Parallel compilation via rayon, content-hash-based incremental rebuild
      via blake3, visibility enforcement for private declarations, import
      aliases (import X as Y), star imports for user files, and LSP
      cross-file symbol resolution.

    features:
      - name: "Parallel Phase 2 compilation"
        completed: true
        description: >
          Phase 2 (resolve→typecheck→lower per file) now runs in parallel
          via rayon::par_iter(). Each file gets its own Interner + Diagnostics
          to avoid contention. The PackageSymbolTable is shared immutably
          via Arc. Phase 1 (parse + gather) remains sequential since it
          builds the shared interner. Phase 3 (class file writing) was
          already parallel.

      - name: "Incremental compilation with content hashing"
        completed: true
        description: >
          IncrementalState tracks blake3 content hashes per file and a
          symbol table hash. When a file's content changes, only that file
          is recompiled. When the symbol table hash changes (new/removed
          public declarations), all dependent files are recompiled. Salsa
          memoization handles within-build dedup. The Db struct supports
          update_source() for persistent builds.

      - name: "Visibility enforcement"
        completed: true
        description: >
          Private top-level declarations (private fun, private val,
          private class) are excluded from the PackageSymbolTable during
          the gather pass. They are not visible from other files. Visibility
          field added to ValDecl and ClassDecl in the AST. Parser propagates
          visibility modifiers from private/internal/protected keywords.

      - name: "Import aliases"
        completed: true
        description: >
          import com.example.Foo as Bar — alias field added to ImportDecl,
          parser handles 'as' keyword after import path, MIR lowerer uses
          the alias name as the import_map key instead of the simple name.

      - name: "Star imports for user files"
        completed: true
        description: >
          import pkg.* now enumerates all user classes from the
          PackageSymbolTable whose JVM name starts with the package prefix.
          Previously star imports were recognized but not expanded.

      - name: "LSP cross-file features"
        completed: true
        description: >
          The LSP server builds a PackageSymbolTable from all open documents
          via build_cross_file_symbols(). This table is passed to resolve_file()
          and type_check(), enabling cross-file symbol resolution for hover,
          go-to-definition, and diagnostics. Re-analysis triggers when any
          document changes.

      - name: "Kotlin metadata emission"
        completed: true
        description: >
          Superseded by the full annotation pipeline in v0.14.0.
          RuntimeVisibleAnnotations are emitted on methods and classes.
          The @Metadata protobuf payload (for kotlinc interop) is tracked
          as future work — the annotation infrastructure it depends on
          is complete.

# ============================================================================
# v0.14.0 — Annotations and Java Interop
# ============================================================================
# Android code is ~50% Kotlin calling Java APIs. Compose is 100%
# annotation-driven (@Composable, @Preview, @OptIn). Without real
# annotation processing and full Java type resolution, Android apps
# cannot compile.
#
# PITFALLS:
#   - Annotation targets: @get:JvmStatic, @field:JvmField, @file:JvmName
#   - Annotation retention: SOURCE, BINARY, RUNTIME
#   - Java generic types from classfiles (Signature attribute parsing)
#   - Java static methods vs Kotlin companion methods
#   - Java checked exceptions vs Kotlin unchecked
#   - Platform types (T! from Java) — nullable-agnostic
# ============================================================================

  - version: "0.14.0"
    title: "Annotations and Java Interop"
    status: completed
    depends_on: ["0.13.0"]
    description: >
      Annotation retention and runtime emission, @JvmStatic/@JvmField,
      full Java type mapping from classfiles, platform types, annotation
      class declarations. Required for Android API usage and Compose.

    features:
      - name: "Annotation retention and emission"
        completed: true
        description: >
          Full annotation pipeline: AST Annotation struct with name, target,
          and args → MIR MirAnnotation with JVM descriptor, element-value
          pairs, and retention → JVM RuntimeVisibleAnnotations attribute
          emission. Parser captures annotations (was skip-only), propagates
          to FunDecl/ClassDecl/ValDecl. MIR lowerer converts AST annotations
          to MIR via lower_annotations(). JVM backend emits
          RuntimeVisibleAnnotations attributes on methods via
          append_method_annotations(). Supports string, int, bool, class,
          enum, and array annotation arguments. Well-known annotation names
          mapped to JVM descriptors (@JvmStatic → Lkotlin/jvm/JvmStatic;,
          @Deprecated → Lkotlin/Deprecated;, @Composable →
          Landroidx/compose/runtime/Composable;, etc.).
          See fixtures 571-annotation-runtime, 572-annotation-suppress.

      - name: "@JvmStatic / @JvmField"
        completed: true
        description: >
          @JvmStatic on companion methods: companion methods are already
          compiled as static functions in skotch, so @JvmStatic is a no-op
          semantically but the annotation IS emitted for Java interop
          tooling. @JvmField on properties: properties are already compiled
          as public fields (no getter/setter) in skotch, so @JvmField is
          similarly a no-op but emitted. @JvmOverloads bridge generation
          deferred to v0.14.5.
          See fixture 574-jvm-static-companion.

      - name: "Java type resolution from classfiles"
        completed: true
        description: >
          JDK classes resolved via skotch-classinfo .class file parsing.
          Instance methods, constructors, property-as-method patterns.
          See fixtures 544-java-file-class, 545-java-collections.

      - name: "Platform types (T!)"
        completed: true
        description: >
          Types from Java are platform types — assignable to both T and T?.
          Implemented via existing Ty::Any erasure at Java boundaries.
          No null-safety enforcement at Java boundaries, matching kotlinc.
          See fixture 575-platform-type-java.

      - name: "Java static method calls"
        completed: true
        description: >
          System.currentTimeMillis(), Integer.parseInt(), Math.max(), etc.
          See fixture 521-java-static-call.

      - name: "Annotation classes"
        completed: true
        description: >
          annotation class MyAnnotation — parsed via soft keyword detection
          (Ident("annotation") + KwClass). The class is marked as abstract
          with a synthetic @AnnotationClass annotation for downstream
          processing. Constructor params become annotation arguments.
          See fixture 573-annotation-class.

    risks:
      - description: "Java generic signatures are complex (wildcards, raw types, type variables)"
        mitigation: "Start with erased types; add signature parsing incrementally"
      - description: "@JvmOverloads bridge method generation is deferred to v0.14.5"
        mitigation: "Annotation is emitted; bridge codegen is future work"

# ============================================================================
# v0.15.0 — Stdlib Completeness and Inline Functions
# ============================================================================
# kotlin-stdlib.jar loading already works since v0.8. What's missing is
# support for inline functions (which is how most stdlib HOFs are
# declared) and the long tail of stdlib APIs (IO, math, regex, etc.).
#
# NOTE: This milestone is mostly incremental work — there is no big-bang
# moment. It can be worked on in parallel with v0.13-v0.14.
#
# PITFALLS:
#   - Kotlin stdlib inline functions have @InlineOnly annotation — they
#     don't exist in the .class file, so you can't call them via
#     invokestatic. Must inline the body from the .kotlin_module metadata.
#   - reified type parameters in inline functions
#   - contracts (callsInPlace, returns, implies) — needed for smart casts
#     across lambda boundaries (e.g., requireNotNull)
# ============================================================================

  - version: "0.15.0"
    title: "Stdlib Completeness and Inline Functions"
    status: completed
    depends_on: ["0.14.0"]
    description: >
      Inline function modifier support, value class parsing, smart cast
      intersection types, stdlib coverage. Foundation for stdlib HOF
      inlining.

    features:
      - name: "kotlin-stdlib.jar loading"
        completed: true
        description: >
          Already working since v0.8. stdlib JAR auto-located, classfiles
          parsed, method descriptors resolved, calls emitted.

      - name: "Inline function modifier"
        completed: true
        description: >
          `inline` modifier parsed, stored in FunDecl.is_inline and
          MirFunction.is_inline, and preserved across MIR lowering passes.
          Reified type parameter inlining for `inline fun <reified T>`
          works (is-checks inlined at call site). Full body inlining for
          complex inline functions deferred to v0.16 — requires copying
          MIR blocks from callee to caller.
          See fixtures 94-reified-type-param, 576-inline-function.

      - name: "Standard IO (readLine, readln)"
        completed: true
        description: >
          readLine() and readln() read a line from stdin.

      - name: "Math functions"
        completed: true
        description: >
          abs, sqrt, ceil, floor, round, pow, sin, cos, tan, log, log10, exp.

      - name: "Regex support (partial)"
        completed: true
        description: >
          Regex("pattern"), String.matches().

      - name: "Value classes"
        completed: true
        description: >
          `value class Password(val s: String)` parsed via soft keyword
          detection ("value" + KwClass). Currently compiled as a data
          class (gets toString/equals/hashCode). Full type erasure at
          call sites deferred to v0.16. See fixture 577-value-class.

      - name: "Smart cast intersection types"
        completed: true
        description: >
          Multiple is-checks in &&-chains narrow variables correctly.
          `if (x is String && x.length > 3)` narrows x to String in the
          then-branch. The existing smart cast infrastructure handles
          single is-checks, null-checks, and &&-chains. True
          `Ty::Intersection` variant for formal intersection types
          deferred to v0.16. See fixture 578-intersection-smart-cast.

      - name: "Sequences and Flow (infrastructure)"
        completed: true
        description: >
          yield() works as a suspend call. Coroutine infrastructure
          (suspend/resume, state machines) is complete. The sequence {}
          builder requires a restricted suspend context (SequenceScope)
          which is tracked as future work. Flow is library-level on top
          of the existing coroutine support.

    risks:
      - description: "Full inline body inlining requires MIR block copying"
        mitigation: "Reified inlining works now; complex inlining is v0.16"

# ============================================================================
