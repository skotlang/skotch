# ============================================================================
# FUTURE ENHANCEMENTS (not scheduled — opportunistic improvements)
# ============================================================================

  - version: "future"
    title: "Dynamic Stdlib Registry from Classfile Scanning"
    status: completed
    depends_on: ["0.15.0"]
    description: >
      Replace the static stdlib-registry tables with runtime classfile
      scanning. Currently skotch-stdlib-registry contains ~140 static
      entries mapping Kotlin stdlib functions, annotations, and JVM
      interfaces. Most of this data is discoverable from kotlin-stdlib.jar
      and the JDK at build time.

    features:
      - name: "JVM interface detection from ACC_INTERFACE flag"
        completed: true
        description: >
          check_is_interface() in skotch-classinfo loads the class and
          checks ACC_INTERFACE (0x0200). is_jvm_interface_check() in
          the JVM backend delegates to this, falling back to the static
          JVM_INTERFACES list when classfiles aren't available. All 6
          invokevirtual/invokeinterface decision sites updated.

      - name: "Type-aware overload resolution"
        completed: true
        description: >
          Implemented in skotch-mir-lower via pick_best_overload() with
          overload_score() scoring. Handles exact matches (Int→I: 3),
          widening (Int→J: 2), autobox (Int→Object: 1). Supports
          int-to-long widening in JVM backend with i2l instruction.

      - name: "Stdlib extension discovery from facade class scanning"
        completed: true
        description: >
          discover_stdlib_extensions() in skotch-classinfo scans
          kotlin-stdlib.jar for all *Kt facade classes. Extracts
          public static methods whose first parameter is the receiver.
          Internal impl classes (CollectionsKt__CollectionsKt) are
          normalized to their public facade. dynamic_stdlib_extension()
          in the MIR lowerer consults this as a fallback when the
          static table has no match. Newly discovered: reduce,
          mapIndexed, mapNotNull, chunked, windowed, partition, etc.

      - name: "Cached registry with content-addressed invalidation"
        completed: true
        description: >
          On first skotch build, scan kotlin-stdlib.jar + JDK jmods and
          build the registry tables from classfile metadata. Cache the
          result in ~/.skotch/cache/stdlib-registry-{blake3-hash}.json.
          Invalidate when the JAR or JDK changes. Fall back to the static
          tables if scanning fails (e.g., no kotlin-stdlib on PATH).

    risks:
      - description: "Scanning kotlin-stdlib.jar adds ~50ms to cold builds"
        mitigation: "Cache aggressively; only rescan when JAR hash changes"
      - description: "Some Kotlin conventions are not discoverable from classfiles alone"
        mitigation: "Keep static fallback tables for edge cases (e.g., joinToString $default pattern)"
