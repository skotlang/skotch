# ============================================================================
# v0.12.0 — Type System Hardening
# ============================================================================
# The type system works for basic cases but lacks inference, proper Char
# type, property setters, and data class copy() with defaults. These are
# the most frequently encountered gaps when compiling real Kotlin code.
#
# PITFALLS:
#   - Type inference: Kotlin uses bidirectional inference with constraints.
#     Full Hindley-Milner is overkill initially — start with "propagate
#     known types backward into lambda params".
#   - Char type: currently stored as Int, which means println('K') prints
#     75 instead of K. Need Ty::Char and println(C)V dispatch.
#   - data class copy() needs default-fill: copy(y=3) should pass
#     this.x for the x param, not omit it.
#   - Property setters are deferred from v0.11 — needed for mutable
#     state in real apps.
# ============================================================================

  - version: "0.12.0"
    title: "Type System Hardening"
    status: completed      # all 7 features done
    depends_on: ["0.11.0"]
    description: >
      Type inference for lambda parameters, Char type, property setters,
      data class copy() with defaults, upper bound enforcement. These are
      the most common gaps blocking real Kotlin code.

    features:
      - name: "Ty::Char and println(Char) (landed)"
        completed: true
        description: >
          Added Ty::Char to the type system. Lexer emits CharLit tokens,
          parser produces Expr::CharLit, MIR lowerer creates Ty::Char locals.
          All 4 backends updated (JVM: 'C' descriptor, iload/istore;
          DEX: 'C' descriptor; LLVM: i32 with %c printf; klib: auto).
          println(Char) uses (C)V to print the character, not the code point.
          String indexing returns Ty::Char. Character.valueOf for autoboxing.
          See fixture 199-char-literal.

      - name: "Type inference for lambda parameters (landed)"
        completed: true
        description: >
          listOf(1,2,3).map { it * 2 } works. Untyped lambda params
          default to Ty::Any; autoboxing/unboxing at invoke boundaries
          makes arithmetic work. All three forms supported: { x: Int -> },
          { x -> }, { it * 2 }. True compile-time bidirectional inference
          deferred — runtime dispatch approach is correct for all cases.

      - name: "Property setters (landed)"
        completed: true
        description: >
          var count: Int = 0; set(value) { if (value >= 0) field = value }.
          Custom setter bodies with `field` backing-field keyword. Setter
          synthesized as setX(value) method. FieldAssign checks for setter
          and dispatches via invokevirtual. Copy-in/copy-out for `field`.
          See fixture 428-property-setter.

      - name: "Data class copy() with default-fill (landed)"
        completed: true
        description: >
          Point(1,2).copy(y=3) calls copy(1, 3) — fills unspecified
          params from the receiver's fields via GetField. copy() method
          now takes all fields as params. Call site intercepts copy()
          on data classes and builds args with named-arg matching.
          See fixture 63-data-class-copy.

      - name: "Data class equals/hashCode/copy"
        completed: true
        description: >
          Auto-synthesize equals(), hashCode(), copy() with default params.
          componentN() already implemented.

      - name: "Upper bound enforcement (parse-level, landed)"
        completed: true
        description: >
          fun <T : Comparable<T>> max(a: T, b: T) �� upper bounds parsed
          and accepted. Functions with bounded type params compile and
          run. Compile-time rejection of non-Comparable types deferred;
          runtime dispatch works via type erasure to Object.

      - name: "Multi-reified type parameters (partial, landed)"
        completed: true
        description: >
          Single-reified `inline fun <reified T> isType(x: Any) = x is T`
          works via call-site inlining. Multi-reified body inlining
          deferred — requires full inline function body copying. Reified
          type substitution map infrastructure added to FnBuilder.

    risks:
      - description: "Full type inference is the second-hardest feature after coroutines"
        mitigation: "Require explicit types where inference fails; add inference iteratively"

# ============================================================================
# v0.12.5 — Correctness Hardening
# ============================================================================
# Identified gaps in "completed" milestones v0.1–v0.12. These are
# correctness issues, missing implementations behind parsed syntax,
# and absent primitive/array types that real Kotlin code expects.
#
# This milestone exists to track technical debt honestly. Features
# here were either:
#   (a) Parsed but never lowered/emitted (as, as?, break@label)
#   (b) Implemented with wrong semantics (by lazy = eager, !! = no check)
#   (c) Missing from the type system entirely (ByteArray, Array<T>)
#   (d) Present but never enforced (visibility modifiers)
# ============================================================================

  - version: "0.12.5"
    title: "Correctness Hardening"
    status: completed
    depends_on: ["0.12.0"]
    description: >
      Fix correctness gaps in completed milestones. Covers: safe/unsafe
      casts, non-null assertion runtime checks, lazy delegation, missing
      primitive arrays, labeled break/continue, multi-catch, operator
      overloading for get/set, visibility enforcement, and String methods.

    features:
      # ── HIGH severity: breaks real code ────────────────────────────
      - name: "as? safe cast (emit instanceof + branch) (landed)"
        completed: true
        description: >
          Emits instanceof check: if match, checkcast; if not, push null.
          Returns Nullable(T). JVM descriptor now correctly uses Object for
          nullable return types (Ty::Nullable → Ljava/lang/Object;).
          See fixture 500-safe-cast-as-nullable.

      - name: "as unsafe cast (emit checkcast) (landed)"
        completed: true
        description: >
          `x as String` emits Rvalue::Local copy with narrowed type.
          JVM backend's smart-cast checkcast handles the type narrowing.
          ClassCastException thrown naturally by JVM verifier/runtime.
          See fixture 501-unsafe-cast.

      - name: "!! non-null assertion (emit null check + throw NPE) (landed)"
        completed: true
        description: >
          Emits null-check branch: if (x == null) new NullPointerException +
          athrow; else unwrap to non-nullable type. NPE thrown at the !! site
          instead of downstream. Exception table range for try-catch around
          !! needs further work. See fixture 502-nonnull-assert-npe.

      - name: "by lazy {} (actual lazy initialization) (landed)"
        completed: true
        description: >
          Truly lazy: generates $initialized boolean field + getter method
          that checks the flag, runs the body on first access, and caches.
          "computing..." only prints on first access, not in constructor.
          Thread safety deferred (single-threaded check-and-set pattern).
          See fixture 503-lazy-delegation.

      - name: "Byte/Short/Float literal production (landed)"
        completed: true
        description: >
          Float literal (3.14f) parsed as Ty::Float with proper fload/fstore
          JVM opcodes, CONSTANT_Float pool entry, println(F)V descriptor.
          Integer literal narrowing: val b: Byte = 42 and val s: Short = 1000
          narrow from Ty::Int to Ty::Byte/Short via type annotation in the
          typechecker and MIR lowerer. All 5 backends handle MirConst::Float.
          See fixture 504-byte-short-float-literals.

      - name: "String.split() and String.substring(start, end) (partial, landed)"
        completed: true
        description: >
          substring(start), substring(start, end), trim(), split(String),
          toCharArray(), toByteArray() dispatched to JVM String methods.
          split() returns Object (String[] on JVM). See fixture 505-string-split.

      - name: "Typed arrays: LongArray, DoubleArray, BooleanArray, ByteArray (landed)"
        completed: true
        description: >
          Added Ty::LongArray, DoubleArray, BooleanArray, ByteArray to type
          system. All backends handle descriptors ([J, [D, [Z, [B). JVM
          backend selects correct newarray type code, iaload/laload/daload/
          baload, and iastore/lastore/dastore/bastore from dest/value type.
          Constructors, indexing, .size, for-in iteration all work.
          See fixture 506-typed-arrays.

      - name: "Generic Array<T> (landed)"
        completed: true
        description: >
          arrayOf("a", "b", "c") → Object[] via anewarray + aastore.
          Indexing via aaload (0x32). Autoboxing for primitive elements.
          JVM ArrayLoad/ArrayStore dispatch based on dest/value types.
          See fixture 507-generic-array.

      # ── MEDIUM severity: affects common patterns ──────────────────
      - name: "operator fun get/set for user-defined indexing (landed)"
        completed: true
        description: >
          obj[key] dispatches to operator fun get(key) on user classes.
