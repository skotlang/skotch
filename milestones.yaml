          See fixture 508-operator-get-set.

      - name: "break@label and continue@label (parse-level, landed)"
        completed: true
        description: >
          AST Break/Continue now have label: Option<Symbol>. Parser
          recognizes @label suffix and label@ prefix on loops.
          Labeled break/continue targets the innermost loop (label
          ignored in MIR lowering — correct for single-loop cases).
          Multi-loop label targeting deferred.
          See fixture 509-labeled-break-continue.

      - name: "Multi-catch: sequential catch clauses (landed)"
        completed: true
        description: >
          try { } catch (e: A) { } catch (e: B) { } — parser now accepts
          sequential catch clauses. Last-catch-wins semantics (simplified).
          Real multi-catch with multiple exception table entries deferred.
          See fixture 510-multi-catch.

      - name: "Smart cast with && conditions (landed)"
        completed: true
        description: >
          if (x is String && x.length > 0) works. Narrowing preserved
          across && in both the rhs expression AND the then-branch body.
          See fixture 511-smart-cast-and.

      - name: "Companion object properties (val/var with backing fields) (landed)"
        completed: true
        description: >
          companion object { val VERSION: Int = 42 } — parser collects
          companion_properties, lowerer registers as global constants and
          class fields. ClassName.PROP access resolved via name_to_global.
          See fixture 512-companion-property.

      - name: "Visibility modifier enforcement (partial, landed)"
        completed: true
        description: >
          Visibility enum (Public/Private/Protected/Internal) added to AST.
          Parser stores visibility on FunDecl. ACC_PRIVATE/ACC_PROTECTED
          constants defined in JVM backend. Private fields correctly hidden
          behind getter methods. Compile-time access control enforcement
          deferred to v0.13 (multi-file).
          See fixture 513-visibility-enforcement.

      # ── LOW severity: edge cases ──────────────────────────────────
      - name: "when exhaustiveness checking for sealed classes (landed)"
        completed: true
        description: >
          when (sealedObj) { ... } without else emits compile error
          listing missing subtypes: "'when' on sealed class X is not
          exhaustive. Missing: Y, Z". See fixture 514-when-exhaustiveness.

      - name: "Enum abstract methods and per-entry overrides (landed)"
        completed: true
        description: >
          enum class Op { PLUS { override fun apply(a: Int, b: Int) = a + b };
          abstract fun apply(a: Int, b: Int): Int }. Parser supports method
          declarations inside enum entries and abstract methods after the
          semicolon separator. Dispatch generates a top-level function
          (EnumName$methodName) that compares this.name against each entry
          and inlines the override body. Supports both direct chains
          (Op.PLUS.apply(3, 2)) and variable calls (val op = Op.PLUS;
