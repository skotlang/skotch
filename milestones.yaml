#   - Package-private visibility
#   - Module boundaries and internal visibility
#   - Classpath ordering affects resolution
# ============================================================================

  - version: "0.15.0"
    title: "Multi-File, Packages, and Modules"
    status: planned
    depends_on: ["0.14.0"]
    description: >
      Multi-file compilation, package-aware resolution, multi-module
      builds, Kotlin metadata emission for cross-module interop.

    features:
      - name: "Multi-file compilation"
        description: >
          Compile multiple .kt files in the same package. Cross-file
          references resolved via two-pass compilation.

      - name: "Multi-module compilation"
        description: >
          Compile module A, then module B that depends on A. Module A's
          classes available when compiling B.

      - name: "Kotlin metadata emission"
        description: >
          @Metadata annotation on generated classes with protobuf payload.
          Required for kotlinc-compiled code to interop with skotch output.

      - name: "Internal visibility enforcement"
        description: "internal members visible within module, hidden outside."

