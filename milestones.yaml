  - version: "0.40.0"
    title: "Compose Compiler Plugin"
    status: planned
    depends_on: ["0.30.0"]
    description: >
      @Composable transform (similar in complexity to the CPS coroutine
      transform), state tracking, remember intrinsic, recomposition
      scheduling. New crate: skotch-compose (MIR-to-MIR pass).

    features:
      - name: "@Composable function transform"
        description: >
          Inject Composer + $changed bitmask parameters. Emit
          startRestartGroup/endRestartGroup calls. Track group keys
          for positional memoization. Similar to CPS transform but
          operates on the Composer API instead of Continuation.
      - name: "remember intrinsic"
        description: >
          remember { value } → Composer.cache(invalid, { value }).
          Slot table read/write for memoized values across recompositions.
      - name: "State tracking (mutableStateOf)"
        description: >
          mutableStateOf(0) creates a State<Int>. Reads are recorded by
          the Composer during composition. Writes trigger recomposition
          of affected scopes.
      - name: "Stability inference"
        description: >
          $stable flags on classes. Immutable classes (all val props,
          no custom equals) are stable. Stable composable params allow
          skipping recomposition when unchanged.
      - name: "CompositionLocal support"
        description: >
          CompositionLocalProvider(LocalTheme provides DarkTheme) { }.
          Thread-local-like ambient values through the composition tree.

    risks:
      - description: "Compose transform is as complex as the coroutine CPS transform (~2000 lines)"
        mitigation: "Reuse patterns from the coroutine transform; both are MIR-to-MIR passes"
      - description: "Compose runtime API evolves rapidly"
        mitigation: "Target a specific Compose BOM version; pin the API surface"

