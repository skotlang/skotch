# ============================================================================
# v0.9.0 — Coroutines and Suspend Functions
# ============================================================================
# THE HARDEST MILESTONE. Coroutines require a CPS (continuation-passing
# style) transform that converts sequential suspend code into a state
# machine. This is ~2000 lines of the most complex compiler code in
# any Kotlin implementation.
#
# IMPLEMENTATION STRATEGY:
# Study kotlinc's CoroutineTransformerMethodVisitor in detail.
# The transform works as follows:
#
#   suspend fun fetchData(): String {
#       val a = suspendCall1()    // suspend point 0
#       val b = suspendCall2(a)   // suspend point 1
#       return a + b
#   }
#
#   ↓ transforms to ↓
#
#   fun fetchData(continuation: Continuation<String>): Any? {
#       val sm = continuation as? FetchDataContinuation
#           ?: FetchDataContinuation(continuation)
#       when (sm.label) {
#           0 -> { sm.label = 1; val result = suspendCall1(sm); if (result == COROUTINE_SUSPENDED) return result; }
#           1 -> { val a = sm.result; sm.label = 2; val result = suspendCall2(a, sm); if (result == COROUTINE_SUSPENDED) return result; }
#           2 -> { val a = sm.a; val b = sm.result; sm.continuation.resume(a + b); return; }
#       }
#   }
#
# Each suspend point becomes a state in the state machine. Local
# variables that cross suspend boundaries are saved to the
# continuation object's fields.
#
# PITFALLS:
#   - Variable liveness: must determine which locals are live across
#     each suspend point and save/restore them
#   - Exception handling: try-catch around suspend calls needs careful
#     state machine integration
#   - Tail call optimization: tailrec suspend functions
#   - Cancellation: CancellationException must propagate correctly
#   - CoroutineContext: must thread through the dispatcher
#   - Structured concurrency: coroutineScope, supervisorScope
#   - Flow: cold streams built on suspend + channels
#
# RECOMMENDED APPROACH:
#   Phase 1: Sequential suspends only (no branching across suspend points)
#   Phase 2: Branching (if/when with suspend calls in branches)
#   Phase 3: Loops with suspend calls
#   Phase 4: Try-catch with suspend calls
#   Phase 5: Flow and channels
# ============================================================================

  - version: "0.9.0"
    title: "Coroutines and Suspend Functions"
    status: completed
    depends_on: ["0.8.0"]
    description: >
      CPS state machine transform for suspend functions. runBlocking,
      launch, async/await, delay. The hardest single milestone.

    # ── Current status ────────────────────────────────────────────────
    # The `suspend` keyword is recognised by the lexer (KwSuspend) and
    # consumed as a modifier by the parser in every position that accepts
    # other function modifiers (top-level, class, interface, object body,
    # object expression). `FunDecl.is_suspend` carries the flag through
    # the AST.
    #
    # Session 2 of the CPS transform has landed: the signature half.
    # Every `suspend fun` now grows a trailing `$completion:
    # Continuation` parameter and has its return type rewritten to
    # `java.lang.Object` at MIR lowering time. `ReturnValue`
    # terminators in suspend functions autobox primitive returns
    # (`Integer.valueOf(42)`); bare `Return` terminators (suspend
    # `Unit` fns) emit `return null` to satisfy the JVM verifier —
    # kotlin.Unit.INSTANCE is the semantically correct value and
    # will land with the rest of the CPS machinery. Call sites that
    # invoke a suspend fn from a non-suspend context pass `null`
    # for the continuation (real kotlinc rejects this at typeck —
    # we accept it for now so single-file parsing + emission
    # fixtures still compile).
    #
    # What's still missing (Session 3+):
    #   - $<funcName>$1 continuation inner class.
    #   - tableswitch 0/1/default state machine for single-suspension-point bodies.
    #   - Multi-suspension-point locals spilling into the continuation class.
    #   - try/catch across suspension points.
    #   - Suspend lambdas / `runBlocking { ... }` builder shape.
    #   - @DebugMetadata annotation on continuation classes.
    #   - Tail-call optimisation for suspend functions.
    #   - DEX / LLVM / klib backends for suspend functions (JVM first).
    #   - Inline suspend functions.
    # ──────────────────────────────────────────────────────────────────

    features:
      - name: "`suspend` keyword parsing (landed)"
        completed: true
        description: >
          Lexer emits TokenKind::KwSuspend. Parser accepts `suspend`
          wherever other function modifiers are allowed and sets
          FunDecl.is_suspend. No runtime semantics yet.
        acceptance_criteria:
          - "`suspend fun compute(): Int = 42` parses with no diagnostics"
          - "`private suspend fun helper(): Int = 1` parses (modifier order free)"
          - "`class Api { suspend fun fetch(): String { ... } }` parses"
          - "FunDecl.is_suspend is true on suspend functions, false otherwise"

      - name: "Suspend function CPS signature transform (landed)"
        completed: true
        description: >
          Every `suspend fun` is lowered with a trailing
          `$completion: Continuation` parameter and its return type
          is rewritten to `java.lang.Object`. Primitive returns are
          autoboxed (`Integer.valueOf`). Calls to suspend functions
          from non-suspend contexts currently pass `null` for the
          continuation. See fixture 390-suspend-signature.
        acceptance_criteria:
          - "`suspend fun compute(): Int = 42` emits descriptor `(Lkotlin/coroutines/Continuation;)Ljava/lang/Object;` matching kotlinc"
          - "MirFunction.is_suspend is threaded from HIR through MIR"

      - name: "Suspend function CPS state machine — single suspension point (landed)"
        completed: true
        description: >
          Session 3 of the coroutine transform. When a `suspend fun`
          has **exactly one** inner suspend call and its post-call
          tail is a literal-constant return, the MIR lowerer attaches
          a SuspendStateMachine marker and synthesizes the companion
          `{WrapperKt}${fn}$1 extends ContinuationImpl` class (with
          `label: int`, `result: Object` fields, a one-arg
          `<init>(Continuation)` that delegates to super, and a
          `invokeSuspend(Object): Object` body that stores the
          result, flips the label's sign bit via `ior MIN_VALUE`,
          and re-invokes the outer suspend function). The JVM backend
          recognizes the marker and emits the canonical kotlinc
          dispatcher + tableswitch pattern (instanceof / label-bit
          check / new-or-reuse continuation / load result + SUSPENDED
          / tableswitch over label / case 0 runs up to the suspend
          call and checks SUSPENDED / case 1 resumes / default throws
          IllegalStateException). Two-plus suspension points emit a
          diagnostic pointing at Session 4. See fixture
          391-suspend-state-machine.
        acceptance_criteria:
          - "391-suspend-state-machine emits `tableswitch`, `iand`, `if_acmpne`, and `IllegalStateException` in the run() body"
          - "Companion class `InputKt$run$1` extends `ContinuationImpl` with `label:I` + `result:Ljava/lang/Object;` fields"
          - "skotch.class passes the JVM verifier with `java -Xverify:all`"
          - "Calling `run(finalCont)` returns `\"done\"` when `yield_()` does not actually suspend"
          - "Two-suspension-point bodies are rejected with a clear error naming Session 4"

      - name: "Suspend function CPS state machine — multi-suspension + local spilling (landed)"
        completed: true
        description: >
          Sessions 4-26 of the coroutine transform. Generalizes Session 3
          to N suspension points with local variables saved/restored
          across the tableswitch cases. Each live local across a
          suspend boundary becomes a field on the continuation class.
          Full StackMapTable generation with wide-type and ref-type
          handling. See fixtures 392-410.

      - name: "runBlocking builder (landed)"
        completed: true
        description: >
          runBlocking { } creates a coroutine scope and blocks the current
          thread until all child coroutines complete. See fixtures 397-398.

      - name: "launch and async/await (landed)"
        completed: true
        description: >
          launch { } starts a fire-and-forget coroutine (returns Job).
          async { } starts a coroutine that returns Deferred<T>.
          deferred.await() suspends until the result is ready.
          See fixtures 399-405.

      - name: "delay function (landed)"
        completed: true
        description: >
          delay(millis) suspends the coroutine for the given duration
          without blocking the thread. Int-to-Long auto-promotion.
          See fixtures 397, 403, 408.

      - name: "CoroutineScope and structured concurrency (landed)"
        completed: true
        description: >
          coroutineScope { } creates a child scope. Parent waits for
          all children. See fixture 411-coroutine-scope.

      - name: "withContext and Dispatchers (landed)"
        completed: true
        description: >
          withContext(Dispatchers.Default) { } switches coroutine context.
          Dispatchers.IO, .Default, .Unconfined, .Main supported via
          static getter dispatch. See fixture 413-with-context.

      - name: "Job.join() and Job.cancel() (landed)"
        completed: true
        description: >
          job.join() suspends until the job completes. job.cancel()
          cancels the job. See fixture 412-job-join.

      - name: "withTimeout and withTimeoutOrNull (landed)"
        completed: true
        description: >
          withTimeout(millis) { } and withTimeoutOrNull(millis) { }
          run a block with a time limit. See fixture 414-with-timeout.

      - name: "yield() cooperative multitasking (landed)"
        completed: true
        description: >
          yield() suspends the current coroutine, allowing other
          coroutines on the same dispatcher to run.
          See fixture 415-yield-coroutine.

      - name: "Suspend methods on classes (landed)"
        completed: true
        description: >
          Class methods marked `suspend` get the full CPS transform:
          signature rewrite, state machine extraction, continuation class.
          Instance method calls are dispatched via invokevirtual with
          Continuation param. The receiver is spilled to the continuation.
          See fixture 416-class-suspend-method.

      - name: "Multi-block state machine — suspend across branches (landed)"
        completed: true
        description: >
          Session 29: suspend calls in if/when branches fully working.
          Case 0 of the tableswitch emits all blocks with inline suspend
          calls. Each branch's delay sets a different label. Resume cases
          emit only the branch-specific tail. Block-path-aware liveness
          analysis. StackMapTable frames for all block start offsets.
          Unit-returning suspend calls store null to result local for
          subsequent MIR Local copies. See fixture 417-suspend-if-branch.

      - name: "Lambda multi-block + Goto terminator (landed)"
        completed: true
        description: >
          Session 30: emit_lambda_multi_suspend_body handles if/when/
          try-catch with suspend calls in lambda bodies. Goto chains
          followed in resume cases. See fixtures 418, 419.

      - name: "Try-catch with return inside suspend functions (landed)"
        completed: true
