# ============================================================================
# skotch — Milestone Roadmap
# ============================================================================
#
# PHILOSOPHY: 100% Kotlin language support first, then tooling.
#
# Every feature must:
#   1. Compile to JVM bytecode (.class) and run correctly
#   2. Compile to DEX and validate with dexdump
#   3. Compile to LLVM IR
#   4. Work in the REPL (skotch repl)
#   5. Work in .kts scripts (skotch run)
#   6. Be exercised by the LSP server (diagnostics, hover)
#   7. Have e2e test fixtures with golden outputs
#   8. Pass cargo clippy + cargo fmt + cargo test
#
# No feature may be marked "completed" if it only works on a happy path.
# Every claimed feature must survive adversarial edge-case testing.
#
# ── Dependency graph ─────────────────────────────────────────────────────
#
#   v0.1–v0.5 (Foundation through Collections) — COMPLETED
#       ↓
#   v0.6  (Higher-order functions)     ← THE critical unlock
#       ↓
#   v0.7  (Null safety + type system)
#       ↓
#   v0.8  (Full collections + stdlib)
#       ↓
#   v0.9  (Coroutines)                 ← hardest milestone
#       ↓
#   v0.10 (Nested/inner classes, enums, sealed)
#       ↓
#   v0.11 (Advanced functions + expressions)
#       ↓
#   v0.12 (Full type system)
#       ↓
#   v0.13 (Kotlin stdlib completeness)
#       ↓
#   v0.14 (DEX backend parity)
#       ↓
#   v0.15 (Multi-file + packages + modules)
#       ↓
#   v0.20 (Build system + dependencies)
#       ↓
#   v0.30 (Android resources + APK)
#       ↓
#   v0.40 (Compose compiler plugin)
#       ↓
#   v1.0  (Compose Samples integration)
#
# ============================================================================

project:
  name: skotch
  tagline: "Streamlined Kotlin Optimized Toolchain"
  repository: https://github.com/skotlang/skotch
  current_version: "0.5.0"
  target_version: "1.0.0"
  target_description: >
    Build every Official Jetpack Compose Sample using only `skotch build`,
    producing debug APKs that install and launch on an Android emulator.
    No external tools (kotlinc, aapt2, d8, AGP, Gradle) required.

