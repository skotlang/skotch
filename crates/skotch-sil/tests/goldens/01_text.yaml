                                - type: "REFERENCE_EXPRESSION"
                                  children:
                                    - type: "IDENTIFIER"
                                      text: "word"
                                - type: "DOT"
                                  text: "."
                                - type: "REFERENCE_EXPRESSION"
                                  children:
                                    - type: "IDENTIFIER"
                                      text: "length"
                        - type: "WHITE_SPACE"
                          text: "\n    "
                        - type: "RBRACE"
                          text: "}"
            - type: "WHITE_SPACE"
              text: "\n"
            - type: "RBRACE"
              text: "}"
    - type: "WHITE_SPACE"
      text: "\n"
