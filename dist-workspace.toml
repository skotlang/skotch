[workspace]
members = ["cargo:."]

#[package]
#name = "skotch-cli"

#[[bin]]
#name = "skotch"

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"

# CI backends to support
ci = "github"

# issue GitHub attestations on binaries that are produced
github-attestations = true

# The installers to generate for each app
installers = ["shell", "powershell", "npm", "homebrew"]

# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-musl", "x86_64-apple-darwin", "x86_64-unknown-linux-musl", "x86_64-pc-windows-msvc"]

# Where to host releases
hosting = "github"

# A GitHub repo to push Homebrew formulas to
tap = "skotlang/homebrew-tap"

formula = "skotch"

archive-formats = ["zip"]

# The archive format to use for non-windows builds (defaults .tar.xz)
unix-archive = ".zip"

# The archive format to use for windows builds (defaults .zip)
windows-archive = ".zip"

# Publish jobs to run in CI
publish-jobs = ["homebrew"]

# Path that installers should place binaries in
install-path = "CARGO_HOME"

# Whether to install an updater program
install-updater = true

